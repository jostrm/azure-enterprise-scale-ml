      $subnetCommonPowerbiGwVal   = if ($_useSubnetNames) { "$(subnetCommonPowerbiGw)" }   else { "" }
      $subnetProjGenAIVal         = if ($_useSubnetNames) { "$(subnetProjGenAI)" }         else { "" }
      $subnetProjAKSVal           = if ($_useSubnetNames) { "$(subnetProjAKS)" }           else { "" }

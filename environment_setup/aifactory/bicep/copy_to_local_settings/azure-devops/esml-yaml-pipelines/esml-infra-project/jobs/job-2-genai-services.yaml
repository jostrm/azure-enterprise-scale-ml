- task: AzureCLI@2
  displayName: '99_detect_existing_acr_role_assignments'
  condition: and(succeeded(), ne(variables['deleteAllServicesForProject'], 'true'))
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
     #!/bin/bash
     set -e

     # Query existing acrPush role assignments at the RESOURCE GROUP level
     # This makes the deployment idempotent by detecting which principals already have the role
     az account set --subscription "$(dev_test_prod_sub_id)"

     # Input parameters
     commonRGNamePrefix="$(admin_aifactoryPrefixRG)"
     projectNumber="$(project_number_000)"
     projectName="prj${projectNumber}"
     locationSuffix="$(admin_locationSuffix)"
     envName="$(dev_test_prod)"
     aifactorySuffixRG="$(admin_aifactorySuffixRG)"
     vnetResourceGroupBase="$(vnetResourceGroupBase)"
     projectPrefix="$(projectPrefix)"
     projectSuffix="$(projectSuffix)"

     # Construct common resource group name
     commonResourceGroup="${commonRGNamePrefix}${vnetResourceGroupBase}-${locationSuffix}-${envName}${aifactorySuffixRG}"
     echo "Common RG resolved to: ${commonResourceGroup}"

     # ACR Push role ID
     acrPushRoleId="8311e382-0749-4cb8-b61a-304f252e45ec"

     # Check if common RG exists
     if ! az group show --name "$commonResourceGroup" &> /dev/null; then
       echo "Common resource group does not exist yet. No existing assignments to check."
       echo "##vso[task.setvariable variable=existingAcrPushUserPrincipals]"
       echo "##vso[task.setvariable variable=existingAcrPushSPPrincipals]"
       exit 0
     fi

     # Query existing role assignments at the RG scope (not ACR scope)
     rgScope="/subscriptions/$(dev_test_prod_sub_id)/resourceGroups/${commonResourceGroup}"
     echo "Querying existing acrPush role assignments at RG scope: ${rgScope}"

     # Get existing User/Group principals with acrPush role
     existingUserPrincipals=$(az role assignment list \
       --resource-group "$commonResourceGroup" \
       --role "$acrPushRoleId" \
       --query "[?principalType=='User' || principalType=='Group'].principalId" \
       -o tsv 2>/dev/null | tr '\n' ',' | sed 's/,$//' || echo "")

     # Get existing ServicePrincipal principals with acrPush role
     existingSPPrincipals=$(az role assignment list \
       --resource-group "$commonResourceGroup" \
       --role "$acrPushRoleId" \
       --query "[?principalType=='ServicePrincipal'].principalId" \
       -o tsv 2>/dev/null | tr '\n' ',' | sed 's/,$//' || echo "")

     echo "Existing User/Group principals with acrPush: ${existingUserPrincipals:-none}"
     echo "Existing ServicePrincipal principals with acrPush: ${existingSPPrincipals:-none}"

     # Set pipeline variables with comma-separated principal IDs
     echo "##vso[task.setvariable variable=existingAcrPushUserPrincipals]${existingUserPrincipals}"
     echo "##vso[task.setvariable variable=existingAcrPushSPPrincipals]${existingSPPrincipals}"
     
     # Set skipACRAssignments to false since we're handling idempotency properly with filtering
     echo "##vso[task.setvariable variable=skipACRAssignments]false"

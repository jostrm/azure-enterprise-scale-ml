- task: AzureCLI@2
  displayName: '69a-Validate-Subnet-For-NetworkInjection'
  # Validates the AGENT subnet (aca2SubnetId) actually written into dynamicNetworkParams.json
  # — not just the conventional name — because that is the value Bicep injects into
  # Microsoft.CognitiveServices/accounts.networkInjections[].subnetArmId. A mismatch
  # there causes the aml_aiagentservice capability host to fail with:
  #   "The environment network configuration is invalid: Invalid vnet resource ID
  #    provided, or the virtual network could not be found."
  #
  # This task VALIDATES (no longer auto-applies) the Microsoft.App/environments
  # delegation on the agent subnet — the delegation is now baked in at creation time
  # by job-1 (esml-genai-1/31-network.bicep -> aca2SubnetSettings.delegations) and
  # reinforced by the conditional subnetDelegationAca module in
  # esml-genai-1/09-ai-foundry-2025-v4.bicep.
  # It still ensures the Microsoft.App resource provider is registered on the target
  # subscription, which is required by the auto-provisioned invisible ACA environment
  # that backs the agent service.
  continueOnError: false
  condition: and(eq(variables['enableAIFoundry'], 'true'), ne(variables['deleteAllServicesForProject'], 'true'), ne(variables['debug_disable_69_aifoundry_2025'], 'true'), eq(variables['pre_foundry_gate_passed'], 'true'), ne(variables['foundry_1st_option_succeeded'], 'true'), ne(variables['aiFoundryV2Exists'], 'true'), or(eq(variables['foundryDeploymentType'], '2'), eq(variables['foundryDeploymentType'], '3')), ne(variables['disableAgentNetworkInjection'], 'true'))
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      #!/bin/bash
      set -e

      az account set --subscription "$(dev_test_prod_sub_id)"

      echo "=== Validating Agent Subnet Configuration for AI Foundry ==="
      echo ""
      echo "🔍 Resolving the ACTUAL aca2SubnetId from dynamicNetworkParams.json"
      echo "   (this is the exact value Bicep passes to networkInjections)."
      echo ""

      params_file="$(System.DefaultWorkingDirectory)/aifactory/parameters/dynamicNetworkParams.json"

      if [ ! -f "$params_file" ]; then
        echo "##[error]❌ dynamicNetworkParams.json not found at: $params_file"
        echo "##[error]   Task 04_pwsh_fetch_network_parameters must run successfully first."
        exit 1
      fi

      echo "📄 dynamicNetworkParams.json contents:"
      cat "$params_file"
      echo ""

      # Extract aca2SubnetId from the generated params file (authoritative value)
      aca2_subnet_id=$(jq -r '.parameters.aca2SubnetId.value // empty' "$params_file" 2>/dev/null || echo "")

      # Fallbacks for environments without jq
      if [ -z "$aca2_subnet_id" ]; then
        aca2_subnet_id=$(python -c "import json,sys;d=json.load(open('$params_file'));print(d['parameters'].get('aca2SubnetId',{}).get('value',''))" 2>/dev/null || echo "")
      fi
      if [ -z "$aca2_subnet_id" ]; then
        aca2_subnet_id=$(grep -A1 '"aca2SubnetId"' "$params_file" | grep '"value"' | sed -E 's/.*"value"\s*:\s*"([^"]*)".*/\1/' | head -n1)
      fi

      echo ""
      echo "🆔 Resolved aca2SubnetId = '$aca2_subnet_id'"
      echo ""

      # If empty: agent network injection is disabled in Bicep (!empty guard) → safe to skip.
      if [ -z "$aca2_subnet_id" ] || [ "$aca2_subnet_id" = "null" ]; then
        echo "##[warning]⚠️  aca2SubnetId is EMPTY in dynamicNetworkParams.json."
        echo "##[warning]   Bicep will skip networkInjections (agentSubnetResourceId='')."
        echo "##[warning]   AI Foundry account will be created WITHOUT agent network injection."
        echo "##[warning]   If you DO want agent network injection, ensure either:"
        echo "##[warning]     - BYO_subnets=true with subnetProjACA2 set, OR"
        echo "##[warning]     - The prior SubnetDeplProj deployment outputs aca2SubnetId."
        exit 0
      fi

      # Parse the resourceId: /subscriptions/<sub>/resourceGroups/<rg>/providers/Microsoft.Network/virtualNetworks/<vnet>/subnets/<subnet>
      if [[ "$aca2_subnet_id" != /subscriptions/*/resourceGroups/*/providers/Microsoft.Network/virtualNetworks/*/subnets/* ]]; then
        echo "##[error]❌ aca2SubnetId is NOT a valid subnet resource ID:"
        echo "##[error]   $aca2_subnet_id"
        echo "##[error]"
        echo "##[error]   Expected: /subscriptions/<sub>/resourceGroups/<rg>/providers/Microsoft.Network/virtualNetworks/<vnet>/subnets/<subnet>"
        echo "##[error]   Fix: check genDynamicNetworkParamFile.ps1 output and prior subnet deployment outputs."
        exit 1
      fi

      sub_id=$(echo "$aca2_subnet_id" | awk -F'/' '{print $3}')
      sub_rg=$(echo "$aca2_subnet_id" | awk -F'/' '{print $5}')
      vnet_name=$(echo "$aca2_subnet_id" | awk -F'/' '{print $9}')
      subnet_name=$(echo "$aca2_subnet_id" | awk -F'/' '{print $11}')

      echo "   subscription: $sub_id"
      echo "   resourceGroup: $sub_rg"
      echo "   vnet:          $vnet_name"
      echo "   subnet:        $subnet_name"
      echo ""

      # 1) Verify the parent VNet exists and is reachable
      echo "⏳ Verifying parent VNet exists..."
      vnet_loc=$(az network vnet show --subscription "$sub_id" --resource-group "$sub_rg" --name "$vnet_name" --query location -o tsv 2>/dev/null || echo "")
      if [ -z "$vnet_loc" ]; then
        echo "##[error]❌ VNet '$vnet_name' NOT FOUND in subscription '$sub_id' / RG '$sub_rg'."
        echo "##[error]   This IS the root cause of the aml_aiagentservice error:"
        echo "##[error]   'Invalid vnet resource ID provided, or the virtual network could not be found.'"
        echo "##[error]   Fix the VNet name/RG/subscription resolution upstream (variables.yaml or genDynamicNetworkParamFile.ps1)."
        exit 1
      fi
      echo "✅ VNet exists in region: $vnet_loc"

      # 1b) Region must match Foundry account location (agent service does not support cross-region)
      foundry_loc="$(admin_location)"
      if [ "$(echo "$vnet_loc" | tr '[:upper:]' '[:lower:]')" != "$(echo "$foundry_loc" | tr '[:upper:]' '[:lower:]')" ]; then
        echo "##[error]❌ VNet region '$vnet_loc' != Foundry region '$foundry_loc'."
        echo "##[error]   AI Foundry agent network injection requires the agent subnet's VNet"
        echo "##[error]   to be in the SAME region as the Foundry account."
        exit 1
      fi
      echo "✅ VNet region matches Foundry region ($foundry_loc)"
      echo ""

      # 2) Verify the subnet exists at the exact resourceId
      # IMPORTANT: do NOT use `az ... --ids ... 2>/dev/null` here — it hides the
      # real error (e.g. transient CLI subscription context loss, throttling, or
      # token refresh) and makes a healthy subnet look "missing". Instead:
      #   - explicitly switch subscription context to the subnet's subscription
      #   - call with named parameters (same shape as the VNet check above)
      #   - capture stderr so the actual Azure error is logged
      #   - retry once on transient failures
      echo "⏳ Verifying subnet exists at the exact resourceId..."

      # Switch context to the subnet's subscription (may differ from the
      # service-connection default if VNet is in a hub subscription).
      az account set --subscription "$sub_id" 1>/dev/null 2>&1 || true

      subnet_err=""
      subnet_resolved=""
      for attempt in 1 2; do
        subnet_resolved=$(az network vnet subnet show \
          --subscription "$sub_id" \
          --resource-group "$sub_rg" \
          --vnet-name "$vnet_name" \
          --name "$subnet_name" \
          --query id -o tsv 2>/tmp/subnet_show_err) || subnet_resolved=""
        subnet_err=$(cat /tmp/subnet_show_err 2>/dev/null || echo "")
        if [ -n "$subnet_resolved" ]; then
          break
        fi
        echo "##[warning]Attempt $attempt: subnet show returned empty. stderr: ${subnet_err:-<none>}"
        sleep 5
      done

      if [ -z "$subnet_resolved" ]; then
        echo "##[error]❌ Subnet NOT FOUND at: $aca2_subnet_id"
        echo "##[error]   subscription: $sub_id"
        echo "##[error]   resourceGroup: $sub_rg"
        echo "##[error]   vnet:          $vnet_name"
        echo "##[error]   subnet:        $subnet_name"
        echo "##[error]   Azure CLI stderr: ${subnet_err:-<empty>}"
        echo "##[error]   Possible causes:"
        echo "##[error]     - The subnet was deleted between job-1 and job-2."
        echo "##[error]     - The service connection lost Reader rights on the VNet RG."
        echo "##[error]     - Transient CLI / ARM throttling (both retries failed)."
        echo "##[error]   Sanity check (azure-cli list of subnets in the VNet):"
        az network vnet subnet list \
          --subscription "$sub_id" \
          --resource-group "$sub_rg" \
          --vnet-name "$vnet_name" \
          --query "[].name" -o tsv || true
        exit 1
      fi
      # Restore subscription context to the deployment target sub
      az account set --subscription "$(dev_test_prod_sub_id)" 1>/dev/null 2>&1 || true
      echo "✅ Subnet resolved: $subnet_resolved"
      echo ""

      # 3) Ensure Microsoft.App resource provider is registered on the target subscription
      #    (required for the auto-provisioned invisible ACA environment behind the agent service)
      echo "⏳ Checking Microsoft.App resource provider registration on subscription $sub_id..."
      rp_state=$(az provider show --subscription "$sub_id" --namespace Microsoft.App --query registrationState -o tsv 2>/dev/null || echo "NotRegistered")
      echo "   Microsoft.App state: $rp_state"
      if [ "$rp_state" != "Registered" ]; then
        echo "##[warning]⚠️  Microsoft.App is not Registered. Registering now (async)..."
        az provider register --subscription "$sub_id" --namespace Microsoft.App --wait || {
          echo "##[error]❌ Failed to register Microsoft.App on subscription $sub_id."
          echo "##[error]   This RP is required by the agent capability host."
          exit 1
        }
        echo "✅ Microsoft.App registered."
      else
        echo "✅ Microsoft.App already registered."
      fi
      echo ""

      # 4) Validate the subnet has Microsoft.App/environments delegation.
      #    The delegation is now baked in at subnet-creation time by job-1
      #    (esml-genai-1/31-network.bicep -> aca2SubnetSettings.delegations) and
      #    reinforced by the conditional subnetDelegationAca module in
      #    esml-genai-1/09-ai-foundry-2025-v4.bicep. This step therefore only
      #    VALIDATES — it no longer mutates the subnet on the fly.
      delegation=$(az network vnet subnet show \
        --subscription "$sub_id" \
        --resource-group "$sub_rg" \
        --vnet-name "$vnet_name" \
        --name "$subnet_name" \
        --query "delegations[0].serviceName" -o tsv 2>/dev/null || echo "")
      echo "⏳ Current delegation: '${delegation:-<none>}'"

      if [ "$delegation" = "Microsoft.App/environments" ]; then
        echo "✅ Subnet correctly delegated to Microsoft.App/environments."
      elif [ -z "$delegation" ]; then
        echo "##[error]❌ Subnet has NO delegation to Microsoft.App/environments."
        echo "##[error]   Expected: job-1 (31-network.bicep -> aca2SubnetSettings.delegations)"
        echo "##[error]            to create the subnet WITH this delegation, and"
        echo "##[error]            09-ai-foundry-2025-v4.bicep (subnetDelegationAca) to ensure it."
        echo "##[error]   Likely cause:"
        echo "##[error]     - The subnet pre-exists (sntAca002Exists=true) so neither bicep wrote it,"
        echo "##[error]     - or job-1 was run from an older template that did not set delegations."
        echo "##[error]   Remediation: manually delegate the subnet, or delete it and re-run job-1."
        echo "##[error]     az network vnet subnet update \\"
        echo "##[error]       --subscription $sub_id --resource-group $sub_rg \\"
        echo "##[error]       --vnet-name $vnet_name --name $subnet_name \\"
        echo "##[error]       --delegations Microsoft.App/environments"
        # Restore subscription context before exit
        az account set --subscription "$(dev_test_prod_sub_id)" 1>/dev/null 2>&1 || true
        exit 1
      else
        echo "##[error]❌ Subnet has CONFLICTING delegation: $delegation"
        echo "##[error]   Required: Microsoft.App/environments"
        echo "##[error]   Either: remove the wrong delegation or use a different subnet for the agent."
        az account set --subscription "$(dev_test_prod_sub_id)" 1>/dev/null 2>&1 || true
        exit 1
      fi
      echo ""

      # 5) Best-effort: ensure subnet is large enough (/27 minimum recommended for ACA)
      prefix=$(az network vnet subnet show --ids "$aca2_subnet_id" --query "addressPrefix" -o tsv 2>/dev/null || echo "")
      echo "ℹ️  Subnet address prefix: $prefix (Container Apps requires /27 or larger)"

      echo ""
      echo "✅ Agent subnet validation COMPLETE — Bicep will receive a valid aca2SubnetId."
- task: AzureCLI@2
  displayName: '69-pre-account-ensure-AISearch-private-DNS-reachable'
  # ── Option B private-reachability gate (deny-public-policy compatible) ──
  # WHY: When the Foundry ACCOUNT is created next (69a-2ndOption-Account) WITH
  # networkInjections (scenario:'agent'), the platform AUTO-PROVISIONS the agent
  # capability host. That auto-provisioning reaches the BYO AI Search to set up agent
  # storage. If the AI Search is NOT privately RESOLVABLE from the AGENT injection VNet
  # at that moment, the platform enables publicNetworkAccess on the AI Search to complete
  # — and never reverts it. The shared-private-link approval (task 100a) runs AFTER the
  # account is created, which is too late.
  #
  # This task makes the AI Search privately reachable from the agent VNet BEFORE the
  # account is created: it (1) approves any Pending AI Search private-endpoint connection,
  # (2) ensures the 'privatelink.search.windows.net' private DNS zone is LINKED to the
  # exact agent injection VNet (parsed from aca2SubnetId in dynamicNetworkParams.json),
  # and (3) ensures an A-record <search> -> <search private IP> exists in that zone.
  # It is idempotent and non-fatal (continueOnError) — it only ADDS DNS records/links.
  #
  # NOTE: This fixes the "private path not reachable" class of failure. If the platform
  # instead validates the AI Search connection via its PUBLIC endpoint at the control
  # plane, no IaC ordering can prevent the flip and a deny-public Azure Policy will cause
  # a hard failure here/at caphost — that case requires a Microsoft support ticket.
  continueOnError: true
  condition: and(eq(variables['enableAIFoundry'], 'true'), ne(variables['deleteAllServicesForProject'], 'true'), ne(variables['debug_disable_69_aifoundry_2025'], 'true'), eq(variables['pre_foundry_gate_passed'], 'true'), ne(variables['foundry_1st_option_succeeded'], 'true'), ne(variables['aiFoundryV2Exists'], 'true'), or(eq(variables['foundryDeploymentType'], '2'), eq(variables['foundryDeploymentType'], '3')), ne(variables['disableAgentNetworkInjection'], 'true'))
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      #!/bin/bash
      set -e
      # Prevent Git-for-Windows (MSYS) from mangling /subscriptions/... ARM paths.
      export MSYS_NO_PATHCONV=1

      az account set --subscription "$(dev_test_prod_sub_id)"

      echo "=== Ensure AI Search is privately reachable from the AGENT VNet BEFORE Foundry account creation ==="
      echo "    (so the auto-provisioned agent capability host resolves AI Search over its private"
      echo "     endpoint and never falls back to enabling public network access)."
      echo ""

      # ── 1. Resolve the AGENT injection VNet from dynamicNetworkParams.json (authoritative aca2SubnetId) ──
      params_file="$(System.DefaultWorkingDirectory)/aifactory/parameters/dynamicNetworkParams.json"
      aca2_subnet_id=""
      if [ -f "$params_file" ]; then
        aca2_subnet_id=$(jq -r '.parameters.aca2SubnetId.value // empty' "$params_file" 2>/dev/null || echo "")
      fi
      if [ -z "$aca2_subnet_id" ] || [ "$aca2_subnet_id" = "null" ]; then
        echo "⚠️  aca2SubnetId is empty — agent network injection not in use. Nothing to wire. Skipping."
        exit 0
      fi

      agent_sub_id=$(echo "$aca2_subnet_id" | awk -F'/' '{print $3}')
      agent_vnet_rg=$(echo "$aca2_subnet_id" | awk -F'/' '{print $5}')
      agent_vnet_name=$(echo "$aca2_subnet_id" | awk -F'/' '{print $9}')
      agent_vnet_id="/subscriptions/${agent_sub_id}/resourceGroups/${agent_vnet_rg}/providers/Microsoft.Network/virtualNetworks/${agent_vnet_name}"
      echo "Agent injection VNet : $agent_vnet_name (rg=$agent_vnet_rg, sub=$agent_sub_id)"

      # ── 2. Resolve the project resource group + AI Search service ──
      commonRGNamePrefix="$(admin_aifactoryPrefixRG)"
      projectNumber="$(project_number_000)"
      locationSuffix="$(admin_locationSuffix)"
      envName="$(dev_test_prod)"
      aifactorySuffixRG="$(admin_aifactorySuffixRG)"
      projectPrefix="$(projectPrefix)"
      projectSuffix="$(projectSuffix)"
      projectResourceGroup="${commonRGNamePrefix}${projectPrefix}project${projectNumber}-${locationSuffix}-${envName}${aifactorySuffixRG}${projectSuffix}"
      echo "Project resource grp : $projectResourceGroup"

      search_name=$(az search service list \
        --subscription "$(dev_test_prod_sub_id)" \
        --resource-group "$projectResourceGroup" \
        --query "[?starts_with(name, 'aisearch')].name | [0]" -o tsv 2>/dev/null || echo "")
      if [ -z "$search_name" ]; then
        echo "⚠️  No AI Search service (prefix 'aisearch') found in $projectResourceGroup. Nothing to wire. Skipping."
        exit 0
      fi
      echo "AI Search service    : $search_name"

      search_pna=$(az search service show --name "$search_name" --resource-group "$projectResourceGroup" \
        --subscription "$(dev_test_prod_sub_id)" --query "publicNetworkAccess" -o tsv 2>/dev/null || echo "")
      echo "AI Search public-net : ${search_pna:-unknown} (target end-state: Disabled)"

      # ── 3. Approve any Pending AI Search private-endpoint connection ──
      search_pe_url="https://management.azure.com/subscriptions/$(dev_test_prod_sub_id)/resourceGroups/${projectResourceGroup}/providers/Microsoft.Search/searchServices/${search_name}/privateEndpointConnections"
      conns=$(az rest --method GET --url "${search_pe_url}?api-version=2024-06-01-preview" -o json 2>/dev/null || echo '{"value":[]}')
      pending=$(echo "$conns" | jq -r '.value[] | select(.properties.privateLinkServiceConnectionState.status == "Pending") | .name | split("/") | .[-1]' | tr -d '\r')
      if [ -n "$pending" ]; then
        for c in $pending; do
          echo "  Approving Pending AI Search PE connection: $c"
          az rest --method PUT --url "${search_pe_url}/${c}?api-version=2024-06-01-preview" \
            --body '{"properties":{"privateLinkServiceConnectionState":{"status":"Approved","description":"Approved by AIFactory pipeline - pre-account reachability gate"}}}' \
            --headers "Content-Type=application/json" -o none 2>/dev/null || echo "    (approve failed - continuing)"
        done
      else
        echo "  AI Search PE connections: none Pending (bicep auto-approves)."
      fi

      # ── 4. Resolve the AI Search private IP (from its private endpoint NIC) ──
      search_pe_id=$(az network private-endpoint list \
        --subscription "$(dev_test_prod_sub_id)" --resource-group "$projectResourceGroup" \
        --query "[?contains(to_string(privateLinkServiceConnections[0].privateLinkServiceId), '/searchServices/${search_name}')].id | [0]" -o tsv 2>/dev/null || echo "")
      if [ -z "$search_pe_id" ]; then
        echo "⚠️  No private endpoint found for AI Search '$search_name'. Cannot wire DNS. Skipping."
        exit 0
      fi
      nic_id=$(az network private-endpoint show --ids "$search_pe_id" --query "networkInterfaces[0].id" -o tsv 2>/dev/null || echo "")
      search_private_ip=$(az network nic show --ids "$nic_id" --query "ipConfigurations[0].privateIPAddress" -o tsv 2>/dev/null || echo "")
      if [ -z "$search_private_ip" ]; then
        echo "⚠️  Could not resolve AI Search private IP from NIC. Skipping DNS wiring."
        exit 0
      fi
      echo "AI Search private IP : $search_private_ip"

      # ── 5. Locate (or create) the privatelink.search.windows.net zone and ensure it is
      #       LINKED to the AGENT VNet (so the agent CAE resolves the search privately) ──
      zone_name="privatelink.search.windows.net"
      target_zone_rg=""
      target_zone_sub=""

      # 5a) Is any such zone already linked to the agent VNet?
      while read -r zid; do
        [ -z "$zid" ] && continue
        zrg=$(echo "$zid" | awk -F'/' '{print $5}')
        zsub=$(echo "$zid" | awk -F'/' '{print $3}')
        linked=$(az network private-dns link vnet list --subscription "$zsub" --resource-group "$zrg" --zone-name "$zone_name" \
          --query "[?contains(to_string(virtualNetwork.id), '/virtualNetworks/${agent_vnet_name}')] | [0].name" -o tsv 2>/dev/null || echo "")
        if [ -n "$linked" ]; then
          target_zone_rg="$zrg"; target_zone_sub="$zsub"
          echo "✅ Zone '$zone_name' already linked to agent VNet (rg=$zrg, link=$linked)."
          break
        fi
      done < <(az network private-dns zone list --query "[?name=='${zone_name}'].id" -o tsv 2>/dev/null)

      # 5b) Not linked to the agent VNet yet → pick/create a zone and link it
      if [ -z "$target_zone_rg" ]; then
        target_zone_sub="$(dev_test_prod_sub_id)"
        exists_proj=$(az network private-dns zone show --subscription "$(dev_test_prod_sub_id)" --resource-group "$projectResourceGroup" --name "$zone_name" --query name -o tsv 2>/dev/null || echo "")
        if [ -n "$exists_proj" ]; then
          target_zone_rg="$projectResourceGroup"
        else
          any_zone_id=$(az network private-dns zone list --subscription "$(dev_test_prod_sub_id)" --query "[?name=='${zone_name}'].id | [0]" -o tsv 2>/dev/null || echo "")
          if [ -n "$any_zone_id" ]; then
            target_zone_rg=$(echo "$any_zone_id" | awk -F'/' '{print $5}')
            target_zone_sub=$(echo "$any_zone_id" | awk -F'/' '{print $3}')
          else
            echo "  Creating private DNS zone '$zone_name' in $projectResourceGroup ..."
            az network private-dns zone create --subscription "$(dev_test_prod_sub_id)" --resource-group "$projectResourceGroup" --name "$zone_name" -o none 2>/dev/null || true
            target_zone_rg="$projectResourceGroup"
          fi
        fi
        echo "  Linking zone '$zone_name' (rg=$target_zone_rg) to agent VNet '$agent_vnet_name' ..."
        az network private-dns link vnet create \
          --subscription "$target_zone_sub" --resource-group "$target_zone_rg" --zone-name "$zone_name" \
          --name "link-${agent_vnet_name}" --virtual-network "$agent_vnet_id" --registration-enabled false -o none 2>/dev/null \
          || echo "    (vnet link create failed or already exists - continuing)"
      fi

      # ── 6. Ensure the search A-record exists in the target zone ──
      echo "  Ensuring A-record '$search_name' -> $search_private_ip in zone '$zone_name' (rg=$target_zone_rg)..."
      existing_ip=$(az network private-dns record-set a show --subscription "$target_zone_sub" --resource-group "$target_zone_rg" --zone-name "$zone_name" --name "$search_name" --query "aRecords[0].ipv4Address" -o tsv 2>/dev/null || echo "")
      if [ "$existing_ip" = "$search_private_ip" ]; then
        echo "    A-record already correct."
      else
        if [ -n "$existing_ip" ]; then
          az network private-dns record-set a remove-record --subscription "$target_zone_sub" --resource-group "$target_zone_rg" --zone-name "$zone_name" --record-set-name "$search_name" --ipv4-address "$existing_ip" -o none 2>/dev/null || true
        fi
        az network private-dns record-set a add-record --subscription "$target_zone_sub" --resource-group "$target_zone_rg" --zone-name "$zone_name" --record-set-name "$search_name" --ipv4-address "$search_private_ip" -o none 2>/dev/null \
          || echo "    (A-record create failed - continuing)"
      fi

      # Restore default subscription context
      az account set --subscription "$(dev_test_prod_sub_id)" 1>/dev/null 2>&1 || true
      echo ""
      echo "✅ AI Search private reachability wiring complete (PE approved + zone linked to agent VNet + A-record present)."
      echo "   The Foundry account (next task) can now reach AI Search privately; no public fallback required."
- task: AzureCLI@2
  displayName: '69a-aifoundry-2025-2ndOption-Account'
  condition: and(eq(variables['enableAIFoundry'], 'true'), ne(variables['deleteAllServicesForProject'], 'true'), ne(variables['debug_disable_69_aifoundry_2025'], 'true'), eq(variables['pre_foundry_gate_passed'], 'true'), ne(variables['foundry_1st_option_succeeded'], 'true'), ne(variables['aiFoundryV2Exists'], 'true'), or(eq(variables['foundryDeploymentType'], '2'), eq(variables['foundryDeploymentType'], '3')))
  retryCountOnTaskFailure: 3
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
     #!/bin/bash
     set -e

     # Mark that 69a actually started — used by task 110 to scope its cleanup
     # ONLY to a real foundry-creation failure (instead of any failed() in the job).
     echo "##vso[task.setvariable variable=foundry_69a_started]true"

     az account set --subscription "$(dev_test_prod_sub_id)"

     # BYO_subnets guard: when BYO_subnets != true, pass empty string for subnetCommon
     _BYO="$(BYO_subnets)"
     _subnet_common="$(subnetCommon)"
     if [ "$_BYO" != "true" ]; then _subnet_common=""; fi

     # Safe-default pipeline vars that may not be set if detection task was skipped.
     # NOTE: do NOT use "$(aiFoundryV2Exists)" inline here. If the pipeline variable is

     if [ -z "$_aiFoundryV2ProjectExists" ] || [[ "$_aiFoundryV2ProjectExists" == *"aiFoundryV2ProjectExists"* ]] || [[ "$_aiFoundryV2ProjectExists" == *'$('* ]]; then _aiFoundryV2ProjectExists="false"; fi

          subnetCommonScoring = @{ value = $subnetCommonScoringVal }
          subnetCommonPowerbiGw = @{ value = $subnetCommonPowerbiGwVal }
          subnetProjGenAI = @{ value = $subnetProjGenAIVal }
          subnetProjAKS = @{ value = $subnetProjAKSVal }
          subnetProjAKS2 = @{ value = $subnetProjAKS2Val }

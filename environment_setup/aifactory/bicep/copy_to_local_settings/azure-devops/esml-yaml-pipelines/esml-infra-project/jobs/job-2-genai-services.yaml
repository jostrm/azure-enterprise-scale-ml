  env:
    # Pass possibly-undefined detection-task pipeline variables via env so that an
    # unresolved $(var) macro becomes a harmless literal env value instead of being
    # evaluated by bash as a command substitution (which caused
    # "aiFoundryV2Exists: command not found").
    AIFOUNDRYV2EXISTS_RAW: $(aiFoundryV2Exists)
    AIFOUNDRYV2PROJECTEXISTS_RAW: $(aiFoundryV2ProjectExists)
# -------------------------------------------------------------------------------------------------
# 69a-Grant-NetworkContributor-For-Injection (BEST-EFFORT / defense-in-depth)
# -------------------------------------------------------------------------------------------------
# PRIMARY FIX (no longer this task): The Foundry account is now created with the pre-provisioned
# project User-Assigned Managed Identity (mi-prj... already holding Network Contributor on the agent
# VNet) attached as part of its identity. Azure uses that UAMI for agent network injection, so the
# cross-RG VNet join succeeds at account-creation time with NO timing race. See Bicep:
#   modules/csFoundry/aiFoundry2025AvmOffApimAccount.bicep  (param agentInjectionUserAssignedIdentityResourceId)
#   esml-genai-1/09-ai-foundry-2025-v4.bicep                (passes getProjectMIPrincipalId.outputs.resourceId)
#
# WHY THIS TASK STILL EXISTS (best-effort only): The account also keeps a SystemAssigned MI (needed
# for CMK RBAC). As defense-in-depth, we ALSO grant that SystemAssigned MI Network Contributor on the
# agent VNet/subnet, in case any future runtime operation uses the account SAMI to touch the VNet.
# This grant is NON-LOAD-BEARING: injection no longer depends on it. Therefore this task is
# best-effort — it logs warnings and ALWAYS exits 0, and it must never fail or block the deployment.
- task: AzureCLI@2
  displayName: '69a-Grant-NetworkContributor-For-Injection (best-effort)'
  condition: and(eq(variables['enableAIFoundry'], 'true'), ne(variables['deleteAllServicesForProject'], 'true'), ne(variables['debug_disable_69_aifoundry_2025'], 'true'), eq(variables['pre_foundry_gate_passed'], 'true'), ne(variables['foundry_1st_option_succeeded'], 'true'), ne(variables['aiFoundryV2Exists'], 'true'), or(eq(variables['foundryDeploymentType'], '2'), eq(variables['foundryDeploymentType'], '3')), succeeded())
  retryCountOnTaskFailure: 2
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      #!/bin/bash
      set -uo pipefail

      az account set --subscription "$(dev_test_prod_sub_id)"

      # Skip when agent network injection is OFF — no ACA injection, so no cross-RG VNet join is needed.
      if [ "$(disableAgentNetworkInjection)" = "true" ]; then
        echo "ℹ️  disableAgentNetworkInjection=true → agent network injection OFF. No Network Contributor grant needed. Skipping."
        exit 0
      fi

      # 1) Resolve the agent subnet id from the authoritative params file (same source as 69a-Validate-Subnet).
      params_file="../../../../aifactory/parameters/dynamicNetworkParams.json"
      aca2_subnet_id=$(jq -r '.parameters.aca2SubnetId.value // empty' "$params_file" 2>/dev/null || echo "")
      if [ -z "$aca2_subnet_id" ]; then
        aca2_subnet_id=$(python -c "import json;d=json.load(open('$params_file'));print(d['parameters'].get('aca2SubnetId',{}).get('value',''))" 2>/dev/null || echo "")
      fi
      if [ -z "$aca2_subnet_id" ] || [ "$aca2_subnet_id" = "null" ]; then
        echo "##[warning]aca2SubnetId is EMPTY → Bicep will skip networkInjections (no agent injection). No grant needed. Skipping."
        exit 0
      fi
      if [[ "$aca2_subnet_id" != /subscriptions/*/resourceGroups/*/providers/Microsoft.Network/virtualNetworks/*/subnets/* ]]; then
        echo "##[warning]aca2SubnetId is NOT a valid subnet resource ID: $aca2_subnet_id — skipping best-effort SAMI grant."
        exit 0
      fi

      # Parse subnet id → subscription / rg / vnet, then build the parent VNet resource id.
      sub_id=$(echo "$aca2_subnet_id" | awk -F'/' '{print $3}')
      sub_rg=$(echo "$aca2_subnet_id"  | awk -F'/' '{print $5}')
      vnet_name=$(echo "$aca2_subnet_id" | awk -F'/' '{print $9}')
      vnet_id="/subscriptions/${sub_id}/resourceGroups/${sub_rg}/providers/Microsoft.Network/virtualNetworks/${vnet_name}"
      echo "Agent subnet : $aca2_subnet_id"
      echo "Parent VNet  : $vnet_id"

      # 2) Resolve the project resource group (same construction as task 05b 'Check if resource exists').
      commonRGNamePrefix="$(admin_aifactoryPrefixRG)"
      projectNumber="$(project_number_000)"
      projectName="prj${projectNumber}"
      locationSuffix="$(admin_locationSuffix)"
      envName="$(dev_test_prod)"
      aifactorySuffixRG="$(admin_aifactorySuffixRG)"
      projectPrefix="$(projectPrefix)"
      projectSuffix="$(projectSuffix)"
      projectNameReplaced="${projectName/prj/project}"
      targetResourceGroup="${commonRGNamePrefix}${projectPrefix}${projectNameReplaced}-${locationSuffix}-${envName}${aifactorySuffixRG}${projectSuffix}"
      echo "targetResourceGroup: $targetResourceGroup"

      # 3) Poll for the Foundry account + its SystemAssigned MI principalId.
      #    Injection no longer depends on this grant (the attached UAMI handles it), so this is a
      #    short, best-effort poll — if the account/MI is not ready quickly we simply skip.
      principal_id=""
      account_name=""
      for attempt in $(seq 1 12); do
        account_name=$(az resource list \
          --resource-group "$targetResourceGroup" \
          --resource-type "Microsoft.CognitiveServices/accounts" \
          --query "[?starts_with(name, 'aif2') && !starts_with(name, 'aif2-p')].name" \
          -o tsv 2>/dev/null | head -n1)
        if [ -n "$account_name" ]; then
          principal_id=$(az cognitiveservices account show \
            --name "$account_name" \
            --resource-group "$targetResourceGroup" \
            --query "identity.principalId" -o tsv 2>/dev/null || echo "")
        fi
        if [ -n "$principal_id" ] && [ "$principal_id" != "null" ]; then
          echo "✅ Foundry account '$account_name' SystemAssigned MI principalId: $principal_id (attempt $attempt)"
          break
        fi
        echo "⏳ Attempt $attempt/12: account/MI not ready yet (account='${account_name:-<none>}'). Waiting 10s..."
        sleep 10
      done

      if [ -z "$principal_id" ] || [ "$principal_id" = "null" ]; then
        echo "##[warning]Could not resolve the Foundry account SystemAssigned MI principalId in RG '$targetResourceGroup' within the best-effort window."
        echo "##[warning]Skipping the defense-in-depth SAMI grant. Injection is unaffected (handled by the attached project UAMI)."
        exit 0
      fi

      # 4) Grant Network Contributor on the agent VNet (covers the child subnet) AND the subnet itself.
      #    Cross-RG, idempotent: skip when the assignment already exists.
      #
      #    IMPORTANT: We deliberately do NOT use `az role assignment create/list`. In the AzureCLI@2
      #    service-principal context those commands fail (even WITH --subscription) with:
      #      "(MissingSubscription) The request did not have a subscription or a valid tenant level
      #       resource provider."
      #    That is a CLI subscription-resolution quirk in the role-assignment module (NOT a perms
      #    error — that would be AuthorizationFailed). Instead we call the ARM Authorization REST API
      #    directly via `az rest`, which uses the already-valid ARM token and a fully-qualified scope
      #    URL, so no subscription inference is required and the grant is deterministic.
      NET_CONTRIB_ROLE_GUID="4d97b98b-1d4f-4787-a291-c67834d212e7"  # built-in 'Network Contributor'
      role_def_id="/subscriptions/${sub_id}/providers/Microsoft.Authorization/roleDefinitions/${NET_CONTRIB_ROLE_GUID}"

      grant_role() {
        local scope="$1"
        local existing
        # Idempotency: does this principal already hold Network Contributor at/above this scope?
        existing=$(az rest --method get \
          --url "https://management.azure.com${scope}/providers/Microsoft.Authorization/roleAssignments?api-version=2022-04-01&\$filter=atScope()" \
          --query "value[?properties.principalId=='${principal_id}' && properties.roleDefinitionId=='${role_def_id}'].id | [0]" \
          -o tsv 2>/dev/null || echo "")
        if [ -n "$existing" ] && [ "$existing" != "null" ]; then
          echo "✅ Network Contributor already assigned at: $scope"
          return 0
        fi
        local ra_guid
        ra_guid=$(cat /proc/sys/kernel/random/uuid 2>/dev/null || python -c "import uuid;print(uuid.uuid4())")
        echo "➕ Granting Network Contributor to $principal_id at: $scope"
        if az rest --method put \
          --url "https://management.azure.com${scope}/providers/Microsoft.Authorization/roleAssignments/${ra_guid}?api-version=2022-04-01" \
          --body "{\"properties\":{\"roleDefinitionId\":\"${role_def_id}\",\"principalId\":\"${principal_id}\",\"principalType\":\"ServicePrincipal\"}}" 1>/dev/null; then
          echo "✅ Granted."
        else
          echo "##[warning]Best-effort SAMI grant failed at: $scope (non-fatal — injection is handled by the attached project UAMI)."
          return 1
        fi
      }

      # Best-effort: a failed SAMI grant must NOT fail the task (injection no longer depends on it).
      # set -e is intentionally NOT used in this script.
      grant_rc=0
      grant_role "$vnet_id"        || grant_rc=1
      grant_role "$aca2_subnet_id" || grant_rc=1
      if [ "$grant_rc" -ne 0 ]; then
        echo "##[warning]One or more defense-in-depth SAMI grants did not succeed — see warnings above. Continuing (non-fatal)."
      fi

      echo ""
      echo "✅ Best-effort Network Contributor grant for the Foundry account SystemAssigned MI completed."
      echo "   Agent network injection is handled by the attached project UAMI, so this grant is defense-in-depth only."
      exit 0
    workingDirectory: '$(System.DefaultWorkingDirectory)/azure-enterprise-scale-ml/environment_setup/aifactory/bicep'
- task: AzureCLI@2
  displayName: '69a-Poll-Deployment-Status'
  condition: and(eq(variables['enableAIFoundry'], 'true'), ne(variables['deleteAllServicesForProject'], 'true'), ne(variables['debug_disable_69_aifoundry_2025'], 'true'), eq(variables['pre_foundry_gate_passed'], 'true'), ne(variables['foundry_1st_option_succeeded'], 'true'), ne(variables['aiFoundryV2Exists'], 'true'), or(eq(variables['foundryDeploymentType'], '2'), eq(variables['foundryDeploymentType'], '3')), succeeded())
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      #!/bin/bash
      set -e
      
      az account set --subscription "$(dev_test_prod_sub_id)"
      
      deployment_name="$(foundry_69a_deployment_name)"
      disable_agent_network_injection="$(disableAgentNetworkInjection)"
      
      # Adjust timing based on agent network injection setting
      if [ "$disable_agent_network_injection" = "false" ]; then
        # With agent network injection: account creation takes ~17-20 min. We cap the
        # polling at 20 minutes total. The OUTER ARM sub-deployment can stay 'Running'
        # even after the Foundry ACCOUNT resource itself has finished (Microsoft-managed
        # agent infra finalizes asynchronously), so if it is still 'Running' at the cap we
        # ASSUME SUCCESS and let '69-wait-account-caphost-succeeded' gate on real readiness.
        initial_wait_minutes=15  # Wait 15 minutes before first check (account creation ~17-20 min)
        max_poll_attempts=5      # After initial wait: 5 attempts x 60s = 5 min -> cap total at 20 min
        total_max_minutes=20
        echo "ℹ️  Agent network injection ENABLED: account creation takes ~17-20 min."
        echo "   Polling is capped at 20 min; a still-'Running' status at the cap is treated as SUCCESS."
      else
        # Without agent network injection: standard timeout
        initial_wait_minutes=10  # Wait 10 minutes before first check
        max_poll_attempts=20     # After initial wait: 20 attempts x 60s = 20 minutes additional polling
        total_max_minutes=30
        echo "ℹ️  Agent network injection DISABLED: Using standard timeout (up to 30 minutes)"
      fi
      
      echo "=== Polling AI Foundry deployment status ==="
      echo "Deployment name: $deployment_name"
      echo "Initial wait: $initial_wait_minutes minutes"
      echo "Then polling every 60 seconds for up to $max_poll_attempts minutes"
      echo "Total max wait time: $total_max_minutes minutes"
      echo ""
      
      # Initial wait - Foundry account creation typically takes 15-17 minutes.
      # Break the wait into 1-minute heartbeats so the hosted agent keeps receiving
      # log output. A single long silent sleep can make the agent drop the job with
      # "logs may have not finished uploading / This job was abandoned".
      echo "⏳ Waiting $initial_wait_minutes minutes before first status check..."
      for ((m = 1; m <= initial_wait_minutes; m++)); do
        sleep 60
        echo "   ...initial wait $m/$initial_wait_minutes min"
      done
      echo ""
      
      # Now start polling
      attempt=0
      while [ $attempt -lt $max_poll_attempts ]; do
        attempt=$((attempt + 1))
        elapsed_minutes=$((initial_wait_minutes + attempt))
        
        status=$(az deployment sub show \
          --name "$deployment_name" \
          --subscription "$(dev_test_prod_sub_id)" \
          --query properties.provisioningState -o tsv 2>/dev/null || echo "NotFound")
        
        echo "[$elapsed_minutes min] Deployment status: $status"
        
        if [ "$status" = "Succeeded" ]; then
          echo "##vso[task.setvariable variable=foundry_69a_deployment_succeeded]true"
          echo ""
          echo "✅ Deployment succeeded after $elapsed_minutes minutes!"
          exit 0
        elif [ "$status" = "Failed" ]; then
          echo ""
          echo "##[error]❌ Deployment failed after $elapsed_minutes minutes!"
          echo "##[section]Error details:"
          
          # Get full error details including nested errors
          error_json=$(az deployment sub show \
            --name "$deployment_name" \
            --subscription "$(dev_test_prod_sub_id)" \
            --query properties.error -o json 2>/dev/null || echo "{}")
          
          echo "$error_json" | jq '.' || echo "$error_json"
          
          # Check for ResourceProviderExtensionError specifically
          if echo "$error_json" | grep -q "ResourceProviderExtensionError"; then
            echo ""
            echo "##[error]🔍 Detected ResourceProviderExtensionError - Azure internal timing issue"
            echo "##[error]"
            echo "##[error]Root Cause:"
            echo "##[error]  When agent network injection is enabled, Azure automatically provisions"
            echo "##[error]  Microsoft-managed infrastructure (invisible Container Apps Environment, networking)"
            echo "##[error]  in the background. The Foundry account creation fails if this internal"
            echo "##[error]  infrastructure isn't ready when the account-level capability host is provisioned."
            echo "##[error]"
            echo "##[error]Why This Happens:"
            echo "##[error]  1. Subnet delegation propagation delay (15-90 seconds)"
            echo "##[error]  2. Microsoft-managed ACA environment not fully initialized"
            echo "##[error]  3. Race condition in Azure's async background provisioning"
            echo "##[error]"
            echo "##[error]✅ Resolution:"
            echo "##[error]  This task does NOT fail the pipeline. It leaves foundry_69a_deployment_succeeded"
            echo "##[error]  unset, so the downstream self-heal purge + 2nd-option (69a 2nd attempt) recover"
            echo "##[error]  automatically once the Microsoft-managed infrastructure has stabilized."
            echo "##[error]"
            echo "##[error]Alternative (if retries fail):"
            echo "##[error]  Set disableAgentNetworkInjection=true to skip automatic provisioning"
          fi
          
          # Check for specific failed resources
          echo ""
          echo "##[section]Failed resource operations:"
          az deployment sub operation list \
            --name "$deployment_name" \
            --subscription "$(dev_test_prod_sub_id)" \
            --query "[?properties.provisioningState=='Failed'].{Resource:properties.targetResource.resourceName, Type:properties.targetResource.resourceType, Error:properties.statusMessage}" \
            -o table 2>/dev/null || echo "Unable to retrieve failed operations"
          
          echo ""
          echo "##[warning]Not failing this task (per design). Leaving foundry_69a_deployment_succeeded"
          echo "##[warning]unset so the downstream self-heal purge + 2nd-option retry can recover."
          exit 0
        elif [ "$status" = "Canceled" ]; then
          echo ""
          echo "##[warning]⚠️ Deployment was canceled after $elapsed_minutes minutes!"
          echo "##[warning]Not failing this task; downstream self-heal + retry will handle recovery."
          exit 0
        elif [ "$status" = "Running" ] || [ "$status" = "Accepted" ]; then
          # Deployment is in progress, continue polling
          if [ $attempt -lt $max_poll_attempts ]; then
            sleep 60
          fi
        else
          # Unknown status, continue polling
          echo "⏳ Status: $status (waiting...)"
          if [ $attempt -lt $max_poll_attempts ]; then
            sleep 60
          fi
        fi
      done
      
      # If we get here, we've exceeded max attempts. The outer ARM sub-deployment can stay
      # 'Running' even after the Foundry ACCOUNT resource has finished, because the
      # Microsoft-managed agent infrastructure (Container Apps Env / capability host)
      # finalizes asynchronously. So a still-'Running' status at the cap is treated as
      # SUCCESS; the downstream '69-wait-account-caphost-succeeded' gates on real readiness.
      echo ""
      echo "##[warning]⏱️ Polling window of $total_max_minutes minutes elapsed. Last status: $status"
      if [ "$status" = "Running" ] || [ "$status" = "Accepted" ]; then
        echo "##[warning]Deployment still '$status' at the cap — assuming SUCCESS. The account resource"
        echo "##[warning]is typically already done; the ARM sub-deployment lags while agent infra finalizes."
        echo "##[warning]Downstream '69-wait-account-caphost-succeeded' will verify the real readiness."
        echo "##vso[task.setvariable variable=foundry_69a_deployment_succeeded]true"
        exit 0
      fi
      echo "##[warning]Status is '$status' (not Running/Accepted). Not failing the task; downstream"
      echo "##[warning]self-heal purge + caphost-wait will handle recovery."
      exit 0
- task: AzureCLI@2
  displayName: '69-wait-account-caphost-succeeded'
  continueOnError: false
  condition: and(eq(variables['enableAIFoundry'], 'true'), eq(variables['enableAFoundryCaphost'], 'true'), ne(variables['deleteAllServicesForProject'], 'true'), ne(variables['debug_disable_69_aifoundry_2025'], 'true'), not(failed()), not(canceled()), ne(variables['disableAgentNetworkInjection'], 'true'), or(eq(variables['foundryDeploymentType'], '2'), eq(variables['foundryDeploymentType'], '3')))
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
     #!/bin/bash
     set -e

     # When disableAgentNetworkInjection=false the platform auto-provisions the
     # account-level capability host asynchronously. The project-level caphost
     # (deployed inside 69b) will fail if the account caphost is not yet Succeeded.
     # This task polls until it reaches Succeeded (or times out after ~20 min).

     az account set --subscription "$(dev_test_prod_sub_id)"

     commonRGNamePrefix="$(admin_aifactoryPrefixRG)"
     projectNumber="$(project_number_000)"
     projectName="prj${projectNumber}"
     locationSuffix="$(admin_locationSuffix)"
     envName="$(dev_test_prod)"
     aifactorySuffixRG="$(admin_aifactorySuffixRG)"
     projectPrefix="$(projectPrefix)"
     projectSuffix="$(projectSuffix)"
     projectNameReplaced="${projectName/prj/project}"
     projectResourceGroup="${commonRGNamePrefix}${projectPrefix}${projectNameReplaced}-${locationSuffix}-${envName}${aifactorySuffixRG}${projectSuffix}"

     # Find the AI Foundry account
     account_name=$(az cognitiveservices account list \
       --subscription "$(dev_test_prod_sub_id)" \
       --resource-group "$projectResourceGroup" \
       --query "[?starts_with(name, 'aif2') && !starts_with(name, 'aif2-p')].name | [0]" -o tsv 2>/dev/null || echo "")

     if [ -z "$account_name" ]; then
       echo "No AI Foundry account found in $projectResourceGroup. Skipping wait."
       exit 0
     fi

     echo "=== Waiting for account-level capability host to reach Succeeded ==="
     echo "Account: $account_name  RG: $projectResourceGroup"

     # IMPORTANT: the platform-auto-provisioned account caphost uses an INTERNAL
     # name that we cannot guess. We therefore LIST capabilityHosts on the
     # account and accept any entry that reaches Succeeded. This is what
     # actually unblocks the project caphost in 69b.
     list_url="https://management.azure.com/subscriptions/$(dev_test_prod_sub_id)/resourceGroups/${projectResourceGroup}/providers/Microsoft.CognitiveServices/accounts/${account_name}/capabilityHosts?api-version=2025-07-01-preview"

     max_attempts=60   # 60 x 20s = 20 min
     prov_state="NotFound"
     for i in $(seq 1 $max_attempts); do
       caphost_list=$(az rest --method GET --url "$list_url" -o json 2>/dev/null || echo "")
       caphost_count=$(echo "$caphost_list" | jq -r '.value | length // 0' 2>/dev/null || echo "0")

       if [ "$caphost_count" = "0" ] || [ -z "$caphost_list" ]; then
         echo "  [$i/$max_attempts] No account caphosts present yet — platform may still be provisioning..."
         sleep 20
         continue
       fi

       # Dump names + states (helpful diagnostics)
       echo "  [$i/$max_attempts] Found $caphost_count account caphost(s):"
       echo "$caphost_list" | jq -r '.value[] | "    - \(.name): \(.properties.provisioningState)"'

       # Succeed as soon as ANY caphost is Succeeded
       succeeded_name=$(echo "$caphost_list" | jq -r '.value[] | select(.properties.provisioningState == "Succeeded") | .name' | head -n 1)
       if [ -n "$succeeded_name" ]; then
         echo "✅ Account capability host '$succeeded_name' is Succeeded. Proceeding to 69b."
         exit 0
       fi

       # Fail fast if all caphosts are in terminal Failed state
       any_inflight=$(echo "$caphost_list" | jq -r '.value[] | select(.properties.provisioningState != "Failed" and .properties.provisioningState != "Canceled") | .name' | head -n 1)
       if [ -z "$any_inflight" ]; then
         echo "##[error]All account capability hosts are in Failed/Canceled state. 69b will fail."
         exit 1
       fi

       prov_state=$(echo "$caphost_list" | jq -r '.value[0].properties.provisioningState')
       sleep 20
     done

     echo "##[warning]Account capability host did not reach Succeeded within 20 min (last state: $prov_state)."
     echo "##[warning]Proceeding to 69b anyway — retryCountOnTaskFailure may recover."

         echo "##[warning]RoleAssignmentExists: Role assignment(s) already exist (created by capability host auto-provisioning). Desired RBAC state is achieved."
         echo "##[warning]Overriding exit code to 0 — RBAC is correctly configured."
       else
         echo "##[error]Deployment failed with errors beyond RoleAssignmentExists:"
         echo "$non_wrapper"
         exit 1
       fi
     fi

     # 69b reached the end without exit 1 — mark success for task 110's scoped cleanup.
     echo "##vso[task.setvariable variable=foundry_69b_succeeded]true"

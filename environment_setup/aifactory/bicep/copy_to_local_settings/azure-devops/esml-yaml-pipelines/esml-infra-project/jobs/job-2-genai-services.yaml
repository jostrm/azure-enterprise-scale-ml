     --parameters addAIFoundry="$(addAIFoundry)" 2>&1) && deploy_rc=0 || deploy_rc=$?

     echo "$deploy_output"

     if [ "$deploy_rc" -ne 0 ]; then
       # Check for InvalidTemplate errors first - these are real failures that must not be ignored
       # Match both with and without spaces after the colon: "code":"InvalidTemplate" or "code": "InvalidTemplate"
       if echo "$deploy_output" | grep -qE '"code"\s*:\s*"InvalidTemplate"'; then
         echo "##[error]Deployment failed with InvalidTemplate error - template validation failed."
         echo "##[error]This usually means a resource reference doesn't exist or Bicep template has syntax errors."
         echo "##[error]Full error output above. Failing task."
         exit 1
       fi
       
       # Check if RoleAssignmentExists is the ONLY real error code
       non_wrapper=$(echo "$deploy_output" | grep -o '"code":"[^"]*"' | sort -u \
         | grep -v '"code":"DeploymentFailed"' \
         | grep -v '"code":"ResourceDeploymentFailure"' \
         | grep -v '"code":"RoleAssignmentExists"')
       if [ -z "$non_wrapper" ]; then
         # RoleAssignmentExists only: the capability host auto-provisioning already created

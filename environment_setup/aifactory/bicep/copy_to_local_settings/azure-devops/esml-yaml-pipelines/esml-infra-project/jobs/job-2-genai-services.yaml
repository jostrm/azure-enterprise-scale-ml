        ["zoneAPIMExists"]="$(zoneAPIMExists)"
        ["aifactory_salt_random"]="$(aifactory_salt_random)"
      )

      # Validate each variable
      for var_name in "${!required_vars[@]}"; do
        value="${required_vars[$var_name]}"
        echo "Checking variable: $var_name, Value: $value"
        if [ -z "$value" ] || [ "$value" = "\$(${var_name})" ]; then
          if [ "$var_name" = "aifactory_salt_random" ]; then
            echo "Warning: Variable $var_name is not set or empty  (It should be 10 characters), but continuing execution. aifactory_salt_random needs to be set if UPDATING an existing project - adding services. But not att init."
          else
            echo "Warning: Required variable $var_name is not set or empty."
            exit 0
          fi
        fi
      done

      echo "All required parameters are set and valid."
- task: AzureCLI@2
  displayName: '06a_Delete_CapabilityHosts'
  continueOnError: true
  # CRITICAL CLEANUP ORDER (per Microsoft Foundry documentation):
  # 1. Delete PROJECT capability host first
  # 2. Wait 60+ seconds for unlink to complete
  # 3. Delete ACCOUNT capability host second
  # 4. Wait ~20 minutes for full cleanup before reusing subnet
  # 
  # Why: Account capability host depends on project capability host. Deleting in wrong
  # order or skipping this step causes "Subnet already in use" errors on redeployment.
  # 
  # API URLs (as per Microsoft.CognitiveServices 2025-04-01-preview):
  # - GET account caphosts:  /accounts/{account}/capabilityHosts
  # - GET project caphosts:  /accounts/{account}/projects/{project}/capabilityHosts
  # - DELETE account caphost: /accounts/{account}/capabilityHosts/{caphost_name}
  # - DELETE project caphost: /accounts/{account}/projects/{project}/capabilityHosts/{caphost_name}
  #
  # Runs when:
  # - enableAFoundryCaphost=true AND cleanFoundryCaphost=true AND
  # - (deleteAllServicesForProject=true OR (enableDeleteForDisabledResources=true AND enableAIFoundry=false))
  condition: and(succeeded(), eq(variables['enableAFoundryCaphost'], 'true'), eq(variables['cleanFoundryCaphost'], 'true'), or(eq(variables['deleteAllServicesForProject'], 'true'), and(eq(variables['enableDeleteForDisabledResources'], 'true'), eq(variables['enableAIFoundry'], 'false'))))
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
     #!/bin/bash
     set -e

     az account set --subscription "$(dev_test_prod_sub_id)"

     # Build resource group name
     commonRGNamePrefix="$(admin_aifactoryPrefixRG)"
     projectNumber="$(project_number_000)"
     locationSuffix="$(admin_locationSuffix)"
     envName="$(dev_test_prod)"
     aifactorySuffixRG="$(admin_aifactorySuffixRG)"
     projectPrefix="$(projectPrefix)"
     projectSuffix="$(projectSuffix)"
     projectResourceGroup="${commonRGNamePrefix}${projectPrefix}project${projectNumber}-${locationSuffix}-${envName}${aifactorySuffixRG}${projectSuffix}"

     echo "=== 06a Delete Capability Hosts ==="
     echo "Resource group: $projectResourceGroup"

     # --- Use salt values set by task 05b_Extract_and_set_aifactory_salt_values ---
     # 05b extracts: aifactory_salt (5 chars, e.g. x46jf) and aifactory_salt_random (10 chars, e.g. c2ebe6a898)
     # from the managed identity in the project RG: mi-prj{num}-{loc}-{env}-{salt5}{random10}-{suffix}
     # These are set via ##vso[task.setvariable] and available to all subsequent tasks.
     uniqueInAIFenv="${aifactory_salt}"
     saltRandom10="${aifactory_salt_random}"

     echo "DEBUG: uniqueInAIFenv='$uniqueInAIFenv' saltRandom10='$saltRandom10'"

     if [ -z "$uniqueInAIFenv" ] || [ -z "$saltRandom10" ]; then
       echo "Salt variables not available from pipeline. Cannot construct Foundry names. Skipping."
       exit 0
     fi

     # Construct Foundry names deterministically (same formula as CmnAIfactoryNaming.bicep)
     # Pattern (cap 20): <base 12 chars> + projectNumber + env
     # When addAIFoundry=false (default):
     #   base account = take(replace(toLower('aif2' + uniqueInAIFenv + cleanRandomValue), '-', ''), 12)
     #   base project = take(toLower('aif2-p' + projectNumber + uniqueInAIFenv + cleanRandomValue), 12)
     #   aifV2Name    = take(<base account> + projectNumber + env, 20)   e.g. aif2h7amw6bc013dev
     #   aifV2PrjName = take(<base project> + env, 20)                    e.g. aif2-p013h7adev
     # When addAIFoundry=true:
     #   base account = take('aif2' + lastSuffixChar + cleanRandomValue, 12)
     #   base project = take('aif2-p' + projectNumber + lastSuffixChar + cleanRandomValue, 12)
     #   aifV2NameAdd    = take(<base account> + projectNumber + env, 20)
     #   aifV2PrjNameAdd = take(<base project> + env, 20)
     # NOTE: Using bash builtins + awk instead of tr (tr can fail silently on some hosted agents due to locale issues)
     cleanRandomValue="${saltRandom10//-/}"
     cleanRandomValue="${cleanRandomValue//_/}"
     cleanRandomValue=$(echo "$cleanRandomValue" | awk '{print tolower($0)}')

     addAIFoundryFlag="${addAIFoundry}"
     resourceSuffix="${admin_prjResourceSuffix}"

     if [ "$addAIFoundryFlag" == "true" ]; then
       # addAIFoundry=true: use lastSuffixChar (last char of resourceSuffix, e.g. '1' from '-001')
       lastSuffixChar="${resourceSuffix: -1}"
       account_base=$(echo "aif2${lastSuffixChar}${cleanRandomValue}" | cut -c1-12)
       project_base=$(echo "aif2-p${projectNumber}${lastSuffixChar}${cleanRandomValue}" | cut -c1-12)
     else
       # Default: use uniqueInAIFenv (5-char salt)
       account_base=$(echo "aif2${uniqueInAIFenv}${cleanRandomValue}" | awk '{gsub(/-/,""); print tolower($0)}' | cut -c1-12)
       project_base=$(echo "aif2-p${projectNumber}${uniqueInAIFenv}${cleanRandomValue}" | awk '{print tolower($0)}' | cut -c1-12)
     fi
     # Append projectNumber + env trail, cap at 20 (Azure CognitiveServices/accounts limit is 64; caphost adds 'caphost' = 7 → 27 safe)
     foundry_account_name=$(echo "${account_base}${projectNumber}${envName}" | awk '{print tolower($0)}' | cut -c1-20)
     foundry_project_name=$(echo "${project_base}${envName}" | awk '{print tolower($0)}' | cut -c1-20)

     echo "DEBUG 06a: addAIFoundry='$addAIFoundryFlag' cleanRandomValue='$cleanRandomValue' account='$foundry_account_name' project='$foundry_project_name'"
     echo "Foundry account name: $foundry_account_name"
     echo "Foundry project name: $foundry_project_name"

     # Call the delete-capHost-command.sh script (it uses || true internally, so it won't fail if caphost doesn't exist)
     script_path="$(System.DefaultWorkingDirectory)/azure-enterprise-scale-ml/environment_setup/aifactory/bicep/scripts/delete-capHost-command.sh"
     echo "Attempting caphost deletion (even if account is already deleted)..."
     bash "$script_path" "$(dev_test_prod_sub_id)" "$projectResourceGroup" "$foundry_account_name" "$foundry_project_name"
    workingDirectory: '$(System.DefaultWorkingDirectory)/azure-enterprise-scale-ml/environment_setup/aifactory/bicep'
  env:
    aifactory_salt: $(aifactory_salt)
    aifactory_salt_random: $(aifactory_salt_random)
    addAIFoundry: $(addAIFoundry)
    admin_prjResourceSuffix: $(admin_prjResourceSuffix)

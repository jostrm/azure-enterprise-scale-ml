- task: AzureCLI@2
  displayName: '69c_cosmosdb_data_contributor_for_foundry_project'
  continueOnError: true
  condition: and(eq(variables['enableAIFoundry'], 'true'), eq(variables['enableCosmosDB'], 'true'), ne(variables['deleteAllServicesForProject'], 'true'), succeeded())
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
     #!/bin/bash
     set -e

     # Prevent Git-for-Windows (MSYS) from converting /subscriptions/... paths
     # to C:/Program Files/Git/subscriptions/... — breaks Azure resource IDs.
     export MSYS_NO_PATHCONV=1

     # Assign Cosmos DB Built-in Data Contributor role to the AI Foundry project's
     # system-assigned managed identity. This is required for the Agent playground
     # (thread storage via CosmosDB). If the role is already assigned, the command
     # returns an error which we catch and ignore so the pipeline succeeds.

     az account set --subscription "$(dev_test_prod_sub_id)"

     # Build resource group name
     commonRGNamePrefix="$(admin_aifactoryPrefixRG)"
     projectNumber="$(project_number_000)"
     projectName="prj${projectNumber}"
     locationSuffix="$(admin_locationSuffix)"
     envName="$(dev_test_prod)"
     aifactorySuffixRG="$(admin_aifactorySuffixRG)"
     projectPrefix="$(projectPrefix)"
     projectSuffix="$(projectSuffix)"
     projectNameReplaced="${projectName/prj/project}"
     projectResourceGroup="${commonRGNamePrefix}${projectPrefix}${projectNameReplaced}-${locationSuffix}-${envName}${aifactorySuffixRG}${projectSuffix}"

     echo "=== Cosmos DB Data Contributor RBAC for AI Foundry project ==="
     echo "Resource group: $projectResourceGroup"

     # ── 1. Discover the AI Foundry account and project ──
     foundry_account_name=$(az cognitiveservices account list \
       --subscription "$(dev_test_prod_sub_id)" \
       --resource-group "$projectResourceGroup" \
       --query "[?starts_with(name, 'aif2') && !starts_with(name, 'aif2-p')].name | [0]" -o tsv 2>/dev/null || echo "")

     if [ -z "$foundry_account_name" ]; then
       echo "No AI Foundry account found in $projectResourceGroup. Skipping."
       exit 0
     fi
     echo "AI Foundry account: $foundry_account_name"

     foundry_account_id=$(az cognitiveservices account show \
       --name "$foundry_account_name" \
       --resource-group "$projectResourceGroup" \
       --query "id" -o tsv)

     # Find the project and its system-assigned identity principal ID
     project_json=$(az rest --method GET \
       --url "https://management.azure.com${foundry_account_id}/projects?api-version=2025-04-01-preview" \
       -o json 2>/dev/null | tr -d '\r' || echo '{"value":[]}')

     echo "DEBUG: Projects found: $(echo "$project_json" | jq '.value | length')"
     echo "DEBUG: Project names: $(echo "$project_json" | jq -r '[.value[].name] | join(", ")')"

     project_principal_id=$(echo "$project_json" | jq -r \
       '[.value[] | select(.identity.principalId != null and .identity.principalId != "")] | .[0].identity.principalId // empty')

     # Fallback: if REST list didn't yield a principalId, construct the project name
     # from salt variables (same formula as 06a / CmnAIfactoryNaming.bicep) and query directly.
     if [ -z "$project_principal_id" ]; then
       echo "REST list did not return a principalId. Trying fallback: construct project name from salt."
       uniqueInAIFenv="${aifactory_salt}"
       saltRandom10="${aifactory_salt_random}"
       if [ -n "$uniqueInAIFenv" ] && [ -n "$saltRandom10" ]; then
         cleanRandomValue="${saltRandom10//-/}"
         cleanRandomValue="${cleanRandomValue//_/}"
         cleanRandomValue=$(echo "$cleanRandomValue" | awk '{print tolower($0)}')
         foundry_project_name=$(echo "aif2-p${projectNumber}${uniqueInAIFenv}${cleanRandomValue}" | awk '{print tolower($0)}' | cut -c1-12)
         echo "DEBUG 69c fallback: constructed project name='$foundry_project_name'"
         fallback_json=$(az rest --method GET \
           --url "https://management.azure.com${foundry_account_id}/projects/${foundry_project_name}?api-version=2025-04-01-preview" \
           -o json 2>/dev/null | tr -d '\r' || echo '{}')
         project_principal_id=$(echo "$fallback_json" | jq -r '.identity.principalId // empty')
         echo "DEBUG 69c fallback: principalId='$project_principal_id'"
       else
         echo "Salt variables not available (salt='$uniqueInAIFenv', random='$saltRandom10'). Cannot construct project name."
       fi
     fi

     if [ -z "$project_principal_id" ]; then
       echo "No AI Foundry project with system-assigned identity found. Skipping."
       exit 0
     fi
     echo "Project system-assigned identity (principalId): $project_principal_id"

     # ── 2. Discover the Cosmos DB account ──
     cosmos_account_name=$(az cosmosdb list \
       --resource-group "$projectResourceGroup" \
       --query "[?starts_with(name, 'cosmos-')].name | [0]" -o tsv 2>/dev/null || echo "")

     if [ -z "$cosmos_account_name" ]; then
       echo "No Cosmos DB account found in $projectResourceGroup. Skipping."
       exit 0
     fi
     echo "Cosmos DB account: $cosmos_account_name"

     # ── 3. Assign Cosmos DB Built-in Data Contributor (00000000-0000-0000-0000-000000000002) ──
     role_definition_id="/subscriptions/$(dev_test_prod_sub_id)/resourceGroups/${projectResourceGroup}/providers/Microsoft.DocumentDB/databaseAccounts/${cosmos_account_name}/sqlRoleDefinitions/00000000-0000-0000-0000-000000000002"

     echo "Assigning Cosmos DB Built-in Data Contributor role..."
     echo "  Role definition: $role_definition_id"
     echo "  Principal: $project_principal_id"

     assign_output=$(az cosmosdb sql role assignment create \
       --account-name "$cosmos_account_name" \
       --resource-group "$projectResourceGroup" \
       --principal-id "$project_principal_id" \
       --role-definition-id "$role_definition_id" \
       --scope "/" 2>&1) && assign_rc=0 || assign_rc=$?

     if [ $assign_rc -eq 0 ]; then
       echo "✅ Cosmos DB Data Contributor role assigned successfully."
     else
       # If role already exists, treat as success
       if echo "$assign_output" | grep -qi "already exists\|conflict\|RoleAssignmentAlreadyExists"; then
         echo "##[warning]Role assignment already exists. Desired RBAC state is achieved."
       else
         echo "##[warning]Role assignment command failed (rc=$assign_rc), but continuing pipeline."
         echo "$assign_output"
       fi
     fi

     echo "=== 69c completed ==="
  env:
    aifactory_salt: $(aifactory_salt)
    aifactory_salt_random: $(aifactory_salt_random)
- task: AzureCLI@2
  displayName: '100a_approve_AI_Search_shared_private_links'
  continueOnError: true
  condition: and(ne(variables['deleteAllServicesForProject'], 'true'), succeeded(), eq(variables['enableAISearchSharedPrivateLink'], 'true'), or(and(eq(variables['enableAIFoundry'], 'true'), eq(variables['enableAFoundryCaphost'], 'true')), eq(variables['enableAISearch'], 'true')))
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
     #!/bin/bash
     set -e

     # Prevent Git-for-Windows (MSYS) from converting /subscriptions/... paths
     # to C:/Program Files/Git/subscriptions/... — breaks Azure resource URLs.
     export MSYS_NO_PATHCONV=1

     # Approve pending shared private link connections from AI Search on:
     #   1) The AI Foundry account (openai_account, cognitiveservices_account, foundry_account)
     #   2) The Storage Account 2001 (blob)
     # These land in "Pending" state and must be approved before AI Search
     # can reach the target resources over the private channel.

     az account set --subscription "$(dev_test_prod_sub_id)"

     # Build resource group name
     commonRGNamePrefix="$(admin_aifactoryPrefixRG)"
     projectNumber="$(project_number_000)"
     locationSuffix="$(admin_locationSuffix)"
     envName="$(dev_test_prod)"
     aifactorySuffixRG="$(admin_aifactorySuffixRG)"
     projectPrefix="$(projectPrefix)"
     projectSuffix="$(projectSuffix)"
     projectResourceGroup="${commonRGNamePrefix}${projectPrefix}project${projectNumber}-${locationSuffix}-${envName}${aifactorySuffixRG}${projectSuffix}"

     echo "=== Approve AI Search Shared Private Links ==="
     echo "Resource group: $projectResourceGroup"

     total_approved=0
     total_failed=0

     # --- Helper function to approve pending PE connections on a resource ---
     approve_pending_connections() {
       local resource_type="$1"  # display name
       local resource_url="$2"   # ARM URL for privateEndpointConnections
       local api_version="$3"

       echo ""
       echo "--- $resource_type ---"
       local connections
       connections=$(az rest --method GET \
         --url "${resource_url}?api-version=${api_version}" \
         -o json 2>/dev/null || echo '{"value":[]}')

       local pending
       # ARM returns .name as "parentName/childName" for child resources.
       # Extract only the last segment (the actual connection name) to avoid
       # duplicating the parent in the URL.
       # tr -d '\r' strips Windows carriage returns that corrupt URLs.
       pending=$(echo "$connections" | jq -r '.value[] | select(.properties.privateLinkServiceConnectionState.status == "Pending") | .name | split("/") | .[-1]' | tr -d '\r')

       if [ -z "$pending" ]; then
         echo "  No pending connections found."
         return
       fi

       for conn_name in $pending; do
         echo "  Approving: $conn_name ..."
         local approve_result rc
         approve_result=$(az rest --method PUT \
           --url "${resource_url}/${conn_name}?api-version=${api_version}" \
           --body '{"properties":{"privateLinkServiceConnectionState":{"status":"Approved","description":"Approved by AIFactory pipeline - AI Search shared private link"}}}' \
           --headers "Content-Type=application/json" \
           -o json 2>&1) && rc=0 || rc=$?
         if [ $rc -eq 0 ]; then
           echo "    Approved: $conn_name"
           total_approved=$((total_approved + 1))
         else
           echo "    Failed: $conn_name"
           echo "    $approve_result"
           total_failed=$((total_failed + 1))
         fi
       done
     }

     # ── 1. Approve on AI Foundry account (openai_account, cognitiveservices_account, foundry_account) ──
     foundry_account_name=$(az cognitiveservices account list \
       --subscription "$(dev_test_prod_sub_id)" \
       --resource-group "$projectResourceGroup" \
       --query "[?starts_with(name, 'aif2') && !starts_with(name, 'aif2-p')].name | [0]" -o tsv 2>/dev/null || echo "")

     if [ -n "$foundry_account_name" ]; then
       echo "AI Foundry account: $foundry_account_name"
       foundry_pe_url="https://management.azure.com/subscriptions/$(dev_test_prod_sub_id)/resourceGroups/${projectResourceGroup}/providers/Microsoft.CognitiveServices/accounts/${foundry_account_name}/privateEndpointConnections"
       approve_pending_connections "AI Foundry account ($foundry_account_name)" "$foundry_pe_url" "2024-10-01"
     else
       echo "No AI Foundry account found in $projectResourceGroup. Skipping Foundry approval."
     fi

     # ── 2. Approve on Storage Account 2001 (blob shared private link) ──
     storage_2001_name=$(az storage account list \
       --subscription "$(dev_test_prod_sub_id)" \
       --resource-group "$projectResourceGroup" \
       --query "[?contains(name, '2001')].name | [0]" -o tsv 2>/dev/null || echo "")

     if [ -n "$storage_2001_name" ]; then
       echo "Storage account 2001: $storage_2001_name"
       storage_pe_url="https://management.azure.com/subscriptions/$(dev_test_prod_sub_id)/resourceGroups/${projectResourceGroup}/providers/Microsoft.Storage/storageAccounts/${storage_2001_name}/privateEndpointConnections"
       approve_pending_connections "Storage account ($storage_2001_name)" "$storage_pe_url" "2024-01-01"
     else
       echo "No storage account with '2001' found in $projectResourceGroup. Skipping storage approval."
     fi

     echo ""
     echo "=== Summary: $total_approved approved, $total_failed failed ==="
- task: AzureCLI@2
  displayName: '100b_create_foundry_agent'
  continueOnError: true
  condition: and(ne(variables['deleteAllServicesForProject'], 'true'), succeeded(), eq(variables['enableAIFoundry'], 'true'))
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
     # Non-fatal: agent creation may fail due to private network isolation
     # when using MS-hosted agents that cannot reach private endpoints.

     az account set --subscription "$(dev_test_prod_sub_id)"

     echo "=== AI Foundry Agent Creation (SDK) ==="

     # ── 0. Early network check using pipeline variables ──
     # Networking modes from variables.yaml:
     #   [false, false, false] = fully private        → skip (unreachable)
     #   [true,  true,  false] = hybrid (IP whitelist) → skip (agent IP not in allow-list)
     #   [true,  true,  true ] = public network        → proceed
     _enablePublicGenAI="$(enablePublicGenAIAccess)"
     _enablePublicPerimeter="$(enablePublicAccessWithPerimeter)"

     if [ "$_enablePublicGenAI" != "true" ] || [ "$_enablePublicPerimeter" != "true" ]; then
       echo "⚠️  Networking mode: enablePublicGenAIAccess=$_enablePublicGenAI, enablePublicAccessWithPerimeter=$_enablePublicPerimeter"
       echo "   MS-hosted ADO agents can only create agents when both are 'true' (public network mode)."
       echo "   Current mode is private or hybrid — data-plane endpoint is unreachable."
       echo ""
       echo "   To create agents, use one of:"
       echo "     • Self-hosted ADO agent on a VM inside the VNet"
       echo "     • Azure Bastion → DSVM → run: python usecase_code/agent_foundry/agent_03_reponses_api.py"
       echo "     • Azure AI Foundry portal (via VPN/ExpressRoute)"
       echo ""
       echo "   Discovering project endpoint for manual use..."

       # Still discover and save the endpoint (ARM control-plane is always reachable)
       foundry_account_id=$(az cognitiveservices account list \
         --subscription "$(dev_test_prod_sub_id)" \
         --resource-group "$(admin_aifactoryPrefixRG)$(projectPrefix)project$(project_number_000)-$(admin_locationSuffix)-$(dev_test_prod)$(admin_aifactorySuffixRG)$(projectSuffix)" \
         --query "[?starts_with(name, 'aif2') && !starts_with(name, 'aif2-p')].id | [0]" -o tsv 2>/dev/null || echo "")

       if [ -n "$foundry_account_id" ]; then
         _ep=$(az rest --method GET \
           --url "https://management.azure.com${foundry_account_id}/projects?api-version=2026-01-15-preview" \
           -o json 2>/dev/null | jq -r ".value[0].properties.endpoint // empty")
         if [ -n "$_ep" ]; then
           echo "✅ Project endpoint: $_ep"
           echo "##vso[task.setvariable variable=foundryProjectEndpoint]$_ep"
           echo ""
           echo "   Manual command:"
           echo "     export FOUNDRY_PROJECT_ENDPOINT=\"$_ep\""
           echo "     pip install azure-ai-projects>=2.0.0 azure-identity"
           echo "     python usecase_code/agent_foundry/agent_03_reponses_api.py"
         fi
       fi

       echo "##vso[task.setvariable variable=foundryAgentCreated]skipped-private-network"
       echo "=== Agent creation task completed (skipped — private/hybrid network) ==="
       exit 0
     fi

     # ── 1. Public network mode — proceed with agent creation ──

     # Build resource group name
     commonRGNamePrefix="$(admin_aifactoryPrefixRG)"
     projectNumber="$(project_number_000)"
     projectName="prj${projectNumber}"
     locationSuffix="$(admin_locationSuffix)"
     envName="$(dev_test_prod)"
     aifactorySuffixRG="$(admin_aifactorySuffixRG)"
     projectPrefix="$(projectPrefix)"
     projectSuffix="$(projectSuffix)"
     projectNameReplaced="${projectName/prj/project}"
     projectResourceGroup="${commonRGNamePrefix}${projectPrefix}${projectNameReplaced}-${locationSuffix}-${envName}${aifactorySuffixRG}${projectSuffix}"

     echo "Target resource group: $projectResourceGroup"

     # Find the AI Foundry account (aif2* but not aif2-p*)
     echo "Searching for AI Foundry account..."
     foundry_account=$(az cognitiveservices account list \
       --subscription "$(dev_test_prod_sub_id)" \
       --resource-group "$projectResourceGroup" \
       --query "[?starts_with(name, 'aif2') && !starts_with(name, 'aif2-p')].{name:name, id:id}" \
       -o json | jq -r '.[0]')

     if [ "$foundry_account" = "null" ] || [ -z "$foundry_account" ]; then
       echo "❌ No AI Foundry account found in resource group. Skipping agent creation."
       exit 0
     fi

     account_name=$(echo "$foundry_account" | jq -r '.name')
     account_id=$(echo "$foundry_account" | jq -r '.id')

     echo "✅ Found AI Foundry account: $account_name"

     # ── 2. Discover project endpoint (ARM control-plane — always reachable) ──
     echo "Searching for AI Foundry project..."
     project_json=$(az rest \
       --method GET \
       --url "https://management.azure.com${account_id}/projects?api-version=2026-01-15-preview" \
       -o json 2>/dev/null || echo '{"value":[]}')

     project_endpoint=$(echo "$project_json" | jq -r \
       "[.value[] | select(.name | startswith(\"aif2-p${projectNumber}\"))] | .[0].properties.endpoint // empty")

     if [ -z "$project_endpoint" ]; then
       project_endpoint=$(echo "$project_json" | jq -r '.value[0].properties.endpoint // empty')
     fi

     # Fallback: the 2026-01-15-preview projects API often returns an empty properties.endpoint
     # even for a healthy project. Construct it deterministically from the account + project name
     # (https://<account>.services.ai.azure.com/api/projects/<project>) — same form used by
     # usecase_code/agent_foundry/*.py.
     if [ -z "$project_endpoint" ]; then
       project_name=$(echo "$project_json" | jq -r "[.value[] | select(.name | startswith(\"aif2-p${projectNumber}\"))] | .[0].name // empty")
       if [ -z "$project_name" ]; then
         project_name=$(echo "$project_json" | jq -r '.value[0].name // empty')
       fi
       if [ -n "$project_name" ]; then
         project_endpoint="https://${account_name}.services.ai.azure.com/api/projects/${project_name}"
         echo "ℹ️  ARM properties.endpoint empty; constructed endpoint: $project_endpoint"
       fi
     fi

     if [ -z "$project_endpoint" ]; then
       echo "❌ No AI Foundry project with endpoint found. Skipping agent creation."
       exit 0
     fi

     echo "✅ Found project endpoint: $project_endpoint"
     echo "##vso[task.setvariable variable=foundryProjectEndpoint]$project_endpoint"

     # ── 3. Create agent via SDK (public network mode confirmed in step 0) ──
     echo "Installing azure-ai-projects SDK..."
     pip install azure-ai-projects>=2.0.0 azure-identity --quiet

     echo "Creating agent via Azure AI Projects SDK..."
     export FOUNDRY_PROJECT_ENDPOINT="$project_endpoint"

     # AzureCliCredential works on MS-hosted agents (AzureCLI@2 already did az login)
     _pyscript="/tmp/_ado_create_agent_$$.py"
     printf '%s\n' \
       'import os, sys' \
       'from azure.identity import AzureCliCredential' \
       'from azure.ai.projects import AIProjectClient' \
       'from azure.ai.projects.models import PromptAgentDefinition' \
       'endpoint = os.environ["FOUNDRY_PROJECT_ENDPOINT"]' \
       'print("Using project endpoint: " + endpoint)' \
       'credential = AzureCliCredential()' \
       'project_client = AIProjectClient(endpoint=endpoint, credential=credential)' \
       'try:' \
       '    agent = project_client.agents.create_version(' \
       '        agent_name="agent-001",' \
       '        definition=PromptAgentDefinition(' \
       '            model="gpt-4o-mini",' \
       '            instructions="You are a helpful AI assistant.",' \
       '        ),' \
       '    )' \
       '    print("Agent created/updated: name=" + agent.name)' \
       'except Exception as e:' \
       '    msg = str(e).lower()' \
       '    if "timed out" in msg or "name resolution" in msg or "connection" in msg:' \
       '        print("Network error, endpoint likely behind private network: " + str(e))' \
       '        sys.exit(0)' \
       '    print("Agent creation failed: " + str(e), file=sys.stderr)' \
       '    sys.exit(1)' \
       > "$_pyscript"
     python3 "$_pyscript"
     _rc=$?
     rm -f "$_pyscript"

     if [ $_rc -eq 0 ]; then
       echo "##vso[task.setvariable variable=foundryAgentCreated]true"
     else
       echo "##vso[task.setvariable variable=foundryAgentCreated]false"
     fi

     echo "=== Agent creation task completed ==="

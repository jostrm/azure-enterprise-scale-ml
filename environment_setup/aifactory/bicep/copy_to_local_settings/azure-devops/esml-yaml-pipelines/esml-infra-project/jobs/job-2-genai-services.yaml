    enablePostgreSQL: $(enablePostgreSQL)
    postgreSQLExists: $(postgreSQLExists)
    enableRedisCache: $(enableRedisCache)
    redisExists: $(redisExists)
    enableSQLDatabase: $(enableSQLDatabase)
    sqlServerExists: $(sqlServerExists)
    sqlDBExists: $(sqlDBExists)
    enableDatabricks: $(enableDatabricks)
    databricksExists: $(databricksExists)
    enableAzureMachineLearning: $(enableAzureMachineLearning)
    amlExists: $(amlExists)
    enableAksForAzureML: $(enableAksForAzureML)
    aksExists: $(aksExists)
    enableDatafactory: $(enableDatafactory)
    dataFactoryExists: $(dataFactoryExists)
    enableBing: $(enableBing)
    bingExists: $(bingExists)
    enableAzureAIVision: $(enableAzureAIVision)
    enableAzureSpeech: $(enableAzureSpeech)
    enableAIDocIntelligence: $(enableAIDocIntelligence)
    enableBingCustomSearch: $(enableBingCustomSearch)
    containerAppsEnvExists: $(containerAppsEnvExists)
    enableBotService: $(enableBotService)
    botServiceExists: $(botServiceExists)
    vmExists: $(vmExists)
    acrProjectExists: $(acrProjectExists)
    aiFoundryV2Exists: $(aiFoundryV2Exists)
    aiHubExists: $(aiHubExists)
    aifProjectExists: $(aifProjectExists)
    aiServicesExists: $(aiServicesExists)
    openaiExists: $(openaiExists)
    enableAIFoundryHub: $(enableAIFoundryHub)
    enableAIServices: $(enableAIServices)
    enableAzureOpenAI: $(enableAzureOpenAI)
    enableContentSafety: $(enableContentSafety)
    contentSafetyExists: $(contentSafetyExists)
- task: AzureCLI@2
  name: purgeSoftDeleted
  displayName: '06c_Purge_SoftDeleted'
  # Purges soft-deleted CognitiveServices-based resources (AI Foundry V2, OpenAI, AI Services) and AML workspaces.
  # Runs in TWO scenarios:
  #   1) After deletion (deleteAllServicesForProject=true OR enableDeleteForDisabledResources=true)
  #   2) When enableAIFoundry=true — preemptive purge to prevent FlagMustBeSetForRestore errors during creation
  # If a purge call fails the pipeline stops here (set -e) — Owner on subscription has purge rights.
  # Emits output variable purgeSoftDeleted.purgeRan (true/false) so 06c2 can skip the subnet-release
  # wait when nothing actually qualified for purge.
  condition: and(succeeded(), or(eq(variables['deleteAllServicesForProject'], 'true'), eq(variables['enableDeleteForDisabledResources'], 'true'), eq(variables['enableAIFoundry'], 'true')))
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      #!/bin/bash
      set -e

      az account set --subscription "$(dev_test_prod_sub_id)"

      # Build resource names / resource group (same formula as task 05b / delete script)
      commonRGNamePrefix="$(admin_aifactoryPrefixRG)"
      projectNumber="$(project_number_000)"
      projectName="prj${projectNumber}"
      locationSuffix="$(admin_locationSuffix)"
      envName="$(dev_test_prod)"
      aifactorySuffixRG="$(admin_aifactorySuffixRG)"
      projectPrefix="$(projectPrefix)"
      projectSuffix="$(projectSuffix)"
      location="$(admin_location)"
      subscription="$(dev_test_prod_sub_id)"
      deleteAll="$(deleteAllServicesForProject)"

      projectNameReplaced="${projectName/prj/project}"
      projectResourceGroup="${commonRGNamePrefix}${projectPrefix}${projectNameReplaced}-${locationSuffix}-${envName}${aifactorySuffixRG}${projectSuffix}"

      echo "Project resource group: $projectResourceGroup"
      echo "deleteAllServicesForProject: $deleteAll"

      # ---------------------------------------------------------------
      # FAST-PATH: if the project resource group does not exist, no Foundry
      # account / OpenAI / AI Services / AML workspace can possibly exist
      # for this project — nothing to purge. Skip immediately to avoid the
      # 5-minute settle sleep and unnecessary list-deleted scans.
      # Also signal 06c2 (subnet-release wait) to skip its 20-minute wait
      # by emitting a pipeline output variable.
      # ---------------------------------------------------------------
      rg_exists=$(az group exists --name "$projectResourceGroup" --subscription "$subscription" 2>/dev/null || echo "false")
      if [ "$rg_exists" != "true" ]; then
        echo "ℹ️  Project resource group '$projectResourceGroup' does not exist — no Foundry account has ever been created for this project."
        echo "=== 04_Purge_SoftDeleted: skipping entirely (project RG missing) ==="
        echo "##vso[task.setvariable variable=purgeRan;isOutput=true]false"
        exit 0
      fi

      # ---------------------------------------------------------------
      # Read all exists/enable flags BEFORE the sleep so we can skip the
      # 5-minute wait entirely when no resource qualifies for purging.
      # Rule: only purge when existed=true AND (enable=false OR deleteAll=true).
      # ---------------------------------------------------------------
      amlExists="${amlExists:-false}"
      enableAML="${enableAzureMachineLearning:-true}"
      aifProjectExists="${aifProjectExists:-false}"
      aiHubExists="${aiHubExists:-false}"
      enableAIFoundryHubFlag="${enableAIFoundryHub:-false}"
      aiFoundryV2Exists="${aiFoundryV2Exists:-false}"
      enableAIFoundry="${enableAIFoundry:-true}"
      openaiExists="${openaiExists:-false}"
      aiServicesExists="${aiServicesExists:-false}"

      echo "exists flags  — aml=$amlExists aifProject=$aifProjectExists aiHub=$aiHubExists aiFoundryV2=$aiFoundryV2Exists openai=$openaiExists aiServices=$aiServicesExists"
      echo "enable flags  — AML=$enableAML AIFoundryHub=$enableAIFoundryHubFlag AIFoundry=$enableAIFoundry"

      needs_purge=false
      if { [ "$amlExists" = "true" ]         && { [ "$enableAML"             = "false" ] || [ "$deleteAll" = "true" ]; }; } || \
         { [ "$aifProjectExists" = "true" ]  && { [ "$enableAIFoundryHubFlag" = "false" ] || [ "$deleteAll" = "true" ]; }; } || \
         { [ "$aiHubExists" = "true" ]       && { [ "$enableAIFoundryHubFlag" = "false" ] || [ "$deleteAll" = "true" ]; }; } || \
         { [ "$aiFoundryV2Exists" = "true" ] && { [ "$enableAIFoundry"        = "false" ] || [ "$deleteAll" = "true" ]; }; } || \
         { [ "$openaiExists" = "true" ]      && { [ "$enableAIFoundry"        = "false" ] || [ "$deleteAll" = "true" ]; }; } || \
         { [ "$aiServicesExists" = "true" ]  && { [ "$enableAIFoundry"        = "false" ] || [ "$deleteAll" = "true" ]; }; }; then
        needs_purge=true
      fi

      # Signal 06c2 (subnet-release wait) whether any resource actually qualifies for purge.
      # If nothing qualifies, there is no Foundry account / subnet delegation to release, so the
      # 20-minute wait is pointless and 06c2 will skip via this output variable.
      echo "##vso[task.setvariable variable=purgeRan;isOutput=true]$needs_purge"

      if [ "$needs_purge" = "true" ]; then
        echo "=== 04_Purge_SoftDeleted: at least one resource qualifies — sleeping 5 minutes to allow soft-delete to settle ==="
        sleep 300
      else
        echo "=== 04_Purge_SoftDeleted: no resources qualify (exists=false or enable=true for all) — skipping sleep ==="
      fi

      # ---------------------------------------------------------------
      # Helper: purge a CognitiveServices account (AI Foundry V2, OpenAI, AI Services).
      # Uses starts_with prefix matching because actual names have random suffixes
      # (e.g. aif2 account → aif2x46jfec0, aiservices → aiservicesprj002sdcdev001).
      # no_dash=$3: if "true", also filters out names containing '-' to distinguish
      # the aif2 ACCOUNT (aif2x46jfec0, no dash) from PROJECTS (aif2-p002x46, has dash).
      # If found but purge fails → set -e exits the pipeline.
      # ---------------------------------------------------------------
      purge_cognitive_service() {
        local prefix="$1"
        local rg="$2"
        local no_dash="${3:-false}"
        echo "--- Checking soft-deleted CognitiveServices with prefix: $prefix (rg=$rg)"

        local actual_name
        if [ "$no_dash" = "true" ]; then
          actual_name=$(az cognitiveservices account list-deleted \
            --subscription "$subscription" \
            --query "[?starts_with(name, '$prefix') && resourceGroup=='$rg'].name" \
            -o tsv 2>/dev/null | grep -v -- '-' | head -n1 || echo "")
        else
          actual_name=$(az cognitiveservices account list-deleted \
            --subscription "$subscription" \
            --query "[?starts_with(name, '$prefix') && resourceGroup=='$rg'].name" \
            -o tsv 2>/dev/null | head -n1 || echo "")
        fi

        if [ -n "$actual_name" ]; then
          echo "Found soft-deleted CognitiveServices: $actual_name. Purging..."
          az cognitiveservices account purge \
            --subscription "$subscription" \
            --location "$location" \
            --resource-group "$rg" \
            --name "$actual_name"
          echo "✅ Purged CognitiveServices account: $actual_name"
        else
          echo "ℹ️  No soft-deleted CognitiveServices found with prefix '$prefix' in rg '$rg' — skipping"
        fi
      }

      # ---------------------------------------------------------------
      # Helper: purge an AML/AI-Foundry-Hub workspace via forceToPurge REST call.
      # AML soft-delete is opt-in; if the workspace is already gone (404) we skip.
      # If the workspace IS in soft-deleted state and purge fails → set -e exits.
      # ---------------------------------------------------------------
      purge_aml_workspace() {
        local name="$1"
        local rg="$2"
        echo "--- Checking soft-deleted AML workspace: $name"

        local http_code
        http_code=$(az rest \
          --method get \
          --url "https://management.azure.com/subscriptions/${subscription}/resourceGroups/${rg}/providers/Microsoft.MachineLearningServices/workspaces/${name}?api-version=2024-04-01" \
          --query "properties.provisioningState" -o tsv 2>/dev/null || echo "NotFound")

        if [ "$http_code" = "SoftDeleted" ] || [ "$http_code" = "Deleting" ]; then
          echo "Found in soft-deleted state ($http_code). Purging AML workspace: $name"
          az rest \
            --method delete \
            --url "https://management.azure.com/subscriptions/${subscription}/resourceGroups/${rg}/providers/Microsoft.MachineLearningServices/workspaces/${name}?api-version=2024-04-01&forceToPurge=true"
          echo "✅ AML workspace purge initiated: $name"
        else
          echo "ℹ️  AML workspace $name not in soft-deleted state (state='$http_code') — skipping"
        fi
      }

      # ---------------------------------------------------------------
      # AML workspace
      # Use actual name recorded by delete script (includes resource suffix like -001)
      # ---------------------------------------------------------------
      amlActualName="${amlActualName:-}"  # set via env: block; safe empty if delete task didn't fire
      amlPrefixName="aml-${projectNumber}-${locationSuffix}-${envName}"
      amlPurgeName="${amlActualName:-$amlPrefixName}"
      if [ "$amlExists" = "true" ] && { [ "$enableAML" = "false" ] || [ "$deleteAll" = "true" ]; }; then
        purge_aml_workspace "$amlPurgeName" "$projectResourceGroup"
      else
        echo "Skipping AML purge (amlExists=$amlExists, enableAML=$enableAML)"
      fi

      # ---------------------------------------------------------------
      # AI Foundry V1 Project (MachineLearningServices/workspaces kind=Project)
      # Purge BEFORE the Hub (child workspace of Hub)
      # Use actual name recorded by delete script (includes resource suffix like -001)
      # ---------------------------------------------------------------
      aifProjectActualName="${aifProjectActualName:-}"  # set via env: block; safe empty if delete task didn't fire
      aifProjectPrefixName="aif-p-${projectNumber}-1-${locationSuffix}-${envName}"
      aifProjectPurgeName="${aifProjectActualName:-$aifProjectPrefixName}"
      if [ "$aifProjectExists" = "true" ] && { [ "$enableAIFoundryHubFlag" = "false" ] || [ "$deleteAll" = "true" ]; }; then
        purge_aml_workspace "$aifProjectPurgeName" "$projectResourceGroup"
      else
        echo "Skipping AI Foundry V1 Project purge (aifProjectExists=$aifProjectExists, enableAIFoundryHub=$enableAIFoundryHubFlag)"
      fi

      # ---------------------------------------------------------------
      # AI Foundry Hub (MachineLearningServices/workspaces kind=Hub)
      # Use actual name recorded by delete script (includes resource suffix like -001)
      # ---------------------------------------------------------------
      aiHubActualName="${aiHubActualName:-}"  # set via env: block; safe empty if delete task didn't fire
      aiHubPrefixName="aif-hub-${projectNumber}-${locationSuffix}-${envName}"
      aiHubPurgeName="${aiHubActualName:-$aiHubPrefixName}"
      if [ "$aiHubExists" = "true" ] && { [ "$enableAIFoundryHubFlag" = "false" ] || [ "$deleteAll" = "true" ]; }; then
        purge_aml_workspace "$aiHubPurgeName" "$projectResourceGroup"
      else
        echo "Skipping AI Foundry Hub purge (aiHubExists=$aiHubExists, enableAIFoundryHub=$enableAIFoundryHubFlag)"
      fi

      # ---------------------------------------------------------------
      # AI Foundry V2 account + project (CognitiveServices/accounts)
      # Use deterministic naming from salt values (same formula as 06a / CmnAIfactoryNaming.bicep)
      # ALWAYS try purge (prevents FlagMustBeSetForRestore on next create)
      # Safe: || true so purge failures never break the pipeline
      # ---------------------------------------------------------------
      uniqueInAIFenv="${aifactory_salt:-}"
      saltRandom10="${aifactory_salt_random:-}"

      # Fallback: if saltRandom10 is empty, re-extract from managed identity (same logic as 05b)
      if [ -z "$saltRandom10" ] || [ -z "$uniqueInAIFenv" ]; then
        echo "Salt variables empty (salt='$uniqueInAIFenv', random='$saltRandom10'). Re-extracting from managed identity..."
        MI_PREFIX="mi-${projectName}-${locationSuffix}-${envName}"
        MI_NAME=$(az resource list \
          --resource-group "$projectResourceGroup" \
          --resource-type "Microsoft.ManagedIdentity/userAssignedIdentities" \
          --query "[?starts_with(name, '$MI_PREFIX')].name" \
          -o tsv 2>/dev/null | head -n 1)
        if [ -n "$MI_NAME" ]; then
          echo "Found managed identity: $MI_NAME"
          MI_NO_SUFFIX="${MI_NAME%-*}"
          SALT_SEGMENT="${MI_NO_SUFFIX##*-}"
          echo "Extracted salt segment: $SALT_SEGMENT (length: ${#SALT_SEGMENT})"
          if [ ${#SALT_SEGMENT} -ge 15 ]; then
            uniqueInAIFenv="${SALT_SEGMENT:0:5}"
            saltRandom10="${SALT_SEGMENT:5:10}"
            echo "Re-extracted: uniqueInAIFenv=$uniqueInAIFenv saltRandom10=$saltRandom10"
          elif [ ${#SALT_SEGMENT} -ge 5 ]; then
            uniqueInAIFenv="${SALT_SEGMENT:0:5}"
            saltRandom10="${SALT_SEGMENT:5}"
            echo "Re-extracted (partial): uniqueInAIFenv=$uniqueInAIFenv saltRandom10=$saltRandom10"
          fi
        else
          echo "Warning: Could not find managed identity with prefix $MI_PREFIX in $projectResourceGroup"
        fi
      fi

      echo "DEBUG 06c salt: uniqueInAIFenv='$uniqueInAIFenv' saltRandom10='$saltRandom10'"

      if [ -n "$uniqueInAIFenv" ] && [ -n "$saltRandom10" ]; then
        # Clean the random value (remove dashes/underscores, lowercase) — same as CmnAIfactoryNaming.bicep cleanRandomValue
        cleanRandomValue="${saltRandom10//-/}"
        cleanRandomValue="${cleanRandomValue//_/}"
        cleanRandomValue=$(echo "$cleanRandomValue" | awk '{print tolower($0)}')
        # Pattern (cap 20): <12-char base> + projectNumber + env  e.g. aif2h7amw6bc013dev
        account_base=$(echo "aif2${uniqueInAIFenv}${cleanRandomValue}" | awk '{gsub(/-/,""); print tolower($0)}' | cut -c1-12)
        project_base=$(echo "aif2-p${projectNumber}${uniqueInAIFenv}${cleanRandomValue}" | awk '{print tolower($0)}' | cut -c1-12)
        foundry_account_name=$(echo "${account_base}${projectNumber}${envName}" | awk '{print tolower($0)}' | cut -c1-20)
        foundry_project_name=$(echo "${project_base}${envName}" | awk '{print tolower($0)}' | cut -c1-20)

        echo "DEBUG 06c: cleanRandomValue='$cleanRandomValue' account='$foundry_account_name' project='$foundry_project_name'"
        echo "Purging AI Foundry V2 by exact name: account=$foundry_account_name project=$foundry_project_name (rg=$projectResourceGroup)"

        echo "--- Purging soft-deleted Foundry V2 project: $foundry_project_name"
        az cognitiveservices account purge \
          --subscription "$subscription" \
          --location "$location" \
          --resource-group "$projectResourceGroup" \
          --name "$foundry_project_name" 2>/dev/null && echo "✅ Purged project: $foundry_project_name" || echo "ℹ️  Project $foundry_project_name not in soft-deleted state or already purged — skipping"

        echo "--- Purging soft-deleted Foundry V2 account: $foundry_account_name"
        az cognitiveservices account purge \
          --subscription "$subscription" \
          --location "$location" \
          --resource-group "$projectResourceGroup" \
          --name "$foundry_account_name" 2>/dev/null && echo "✅ Purged account: $foundry_account_name" || echo "ℹ️  Account $foundry_account_name not in soft-deleted state or already purged — skipping"
      else
        echo "⚠️  Salt variables not available (salt='$uniqueInAIFenv', random='$saltRandom10'). Falling back to list-deleted prefix scan."
        purge_cognitive_service "aif2" "$projectResourceGroup" "true" || true
        purge_cognitive_service "aif2-p" "$projectResourceGroup" "false" || true
      fi

      # ---------------------------------------------------------------
      # Azure OpenAI (CognitiveServices/accounts) — tied to AI Foundry lifecycle
      # Name prefix: aoai-{projectName}-{locationSuffix}-{envName} (may have resource suffix)
      # ---------------------------------------------------------------
      openaiPrefix="aoai-${projectName}-${locationSuffix}-${envName}"
      if [ "$openaiExists" = "true" ] && { [ "$enableAIFoundry" = "false" ] || [ "$deleteAll" = "true" ]; }; then
        purge_cognitive_service "$openaiPrefix" "$projectResourceGroup"
      else
        echo "Skipping OpenAI purge (openaiExists=$openaiExists, enableAIFoundry=$enableAIFoundry)"
      fi

      # ---------------------------------------------------------------
      # AI Services (CognitiveServices/accounts)
      # Name prefix: aiservices{projectName}{locationSuffix}{envName} (may have resource suffix)
      # ---------------------------------------------------------------
      aiServicesPrefix="aiservices${projectName}${locationSuffix}${envName}"
      if [ "$aiServicesExists" = "true" ] && { [ "$enableAIFoundry" = "false" ] || [ "$deleteAll" = "true" ]; }; then
        purge_cognitive_service "$aiServicesPrefix" "$projectResourceGroup"
      else
        echo "Skipping AI Services purge (aiServicesExists=$aiServicesExists, enableAIFoundry=$enableAIFoundry)"
      fi

      echo "=== 04_Purge_SoftDeleted complete ==="
  env:
    # All variables that may be unset (set dynamically via ##vso[task.setvariable] in prior tasks,
    # or simply not defined yet) are passed through env: so bash always gets a safe empty/default
    # string instead of a bare $(varName) token that bash would try to execute as a command.
    amlActualName: $(amlActualName)
    aifProjectActualName: $(aifProjectActualName)
    aiHubActualName: $(aiHubActualName)
    amlExists: $(amlExists)
    aifProjectExists: $(aifProjectExists)
    aiHubExists: $(aiHubExists)
    aiFoundryV2Exists: $(aiFoundryV2Exists)
    openaiExists: $(openaiExists)
    aiServicesExists: $(aiServicesExists)
    enableAzureMachineLearning: $(enableAzureMachineLearning)
    enableAIFoundryHub: $(enableAIFoundryHub)
    enableAIFoundry: $(enableAIFoundry)
    aifactory_salt: $(aifactory_salt)
    aifactory_salt_random: $(aifactory_salt_random)
- task: AzureCLI@2
  displayName: '06c2_Wait_For_Subnet_Release_After_Purge'
  # CRITICAL: After purging Foundry account, Azure needs ~20 minutes to fully release the subnet.
  # This prevents "Subnet already in use" errors when redeploying to the same subnet.
  # 
  # Per Microsoft Foundry documentation:
  # "Please allow approximately max of 20 minutes for all resources to be fully unlinked from the account."
  # https://github.com/microsoft-foundry/foundry-samples/tree/main/infrastructure/infrastructure-setup-bicep/15-private-network-standard-agent-setup
  # 
  # This task only runs when:
  # - 06c actually purged something (purgeSoftDeleted.purgeRan=true) — if nothing was purged there is
  #   no subnet delegation to release, so waiting is pointless.
  # - deleteAllServicesForProject=true OR enableDeleteForDisabledResources=true (purge happened)
  # - enableAIFoundry=true (Foundry resources were deployed)
  # - aiFoundryV2Exists=false (account was purged, not pre-existing)
  # - 06c_Purge task succeeded
  # - deleteAllForProject != true (ULTRA mode tears down RG + networking; no redeploy follows, so waiting for subnet release is pointless)
  # - BYO_subnets != true (customer manages their own subnets — never held by this pipeline, nothing to wait for)
  condition: and(succeeded(), eq(variables['purgeSoftDeleted.purgeRan'], 'true'), ne(variables['deleteAllForProject'], 'true'), ne(variables['BYO_subnets'], 'true'), or(eq(variables['deleteAllServicesForProject'], 'true'), eq(variables['enableDeleteForDisabledResources'], 'true')), eq(variables['enableAIFoundry'], 'true'), ne(variables['aiFoundryV2Exists'], 'true'))
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      #!/bin/bash

      # ---------------------------------------------------------------
      # FAST-PATH: if the project resource group does not exist, no Foundry
      # account / capability host / subnet delegation was ever created for
      # this project. The 20-minute subnet-release wait is pointless — skip.
      # ---------------------------------------------------------------
      commonRGNamePrefix="$(admin_aifactoryPrefixRG)"
      projectNumber="$(project_number_000)"
      projectName="prj${projectNumber}"
      locationSuffix="$(admin_locationSuffix)"
      envName="$(dev_test_prod)"
      aifactorySuffixRG="$(admin_aifactorySuffixRG)"
      projectPrefix="$(projectPrefix)"
      projectSuffix="$(projectSuffix)"
      subscription="$(dev_test_prod_sub_id)"
      projectNameReplaced="${projectName/prj/project}"
      projectResourceGroup="${commonRGNamePrefix}${projectPrefix}${projectNameReplaced}-${locationSuffix}-${envName}${aifactorySuffixRG}${projectSuffix}"

      # BYO_subnets: customer manages their own subnets — Azure never delegated/held them via this
      # pipeline, so there is nothing to wait for. Skip entirely (defense-in-depth; the task
      # condition also gates on BYO_subnets != true).
      byo_subnets="$(BYO_subnets)"
      if [ "$byo_subnets" = "true" ]; then
        echo "ℹ️  BYO_subnets=true — customer-managed subnets are not held by this pipeline."
        echo "=== 06c2_Wait_For_Subnet_Release_After_Purge: skipping wait (BYO_subnets) ==="
        exit 0
      fi

      az account set --subscription "$subscription" >/dev/null 2>&1 || true
      rg_exists=$(az group exists --name "$projectResourceGroup" --subscription "$subscription" 2>/dev/null || echo "false")
      if [ "$rg_exists" != "true" ]; then
        echo "ℹ️  Project resource group '$projectResourceGroup' does not exist — no Foundry account / subnet delegation was ever created."
        echo "=== 06c2_Wait_For_Subnet_Release_After_Purge: skipping 20-minute wait (project RG missing) ==="
        exit 0
      fi

      echo "=== Waiting for Complete Subnet Release After Account Purge ==="
      echo ""
      echo "⚠️  CRITICAL TIMING: Microsoft-managed infrastructure cleanup"
      echo ""
      echo "What happens during this wait:"
      echo "  1. Azure purges the soft-deleted Foundry account"
      echo "  2. Microsoft-managed Container Apps Environment is removed"
      echo "  3. Subnet delegation to Microsoft.App/environments is released"
      echo "  4. Network policies and route tables are cleaned up"
      echo "  5. Background async operations complete"
      echo ""
      echo "Why 20 minutes?"
      echo "  • Capability host unlink: 2-5 minutes"
      echo "  • Account purge completion: 5-10 minutes"
      echo "  • Subnet delegation propagation: 5-10 minutes"
      echo "  • Total worst-case: ~20 minutes"
      echo ""
      echo "Without this wait, redeployment will fail with:"
      echo "  ❌ 'Subnet already in use'"
      echo "  ❌ 'ResourceProviderExtensionError'"
      echo "  ❌ 'DelegationNotCleared'"
      echo ""
      echo "📖 Reference: https://github.com/microsoft-foundry/foundry-samples/tree/main/infrastructure/infrastructure-setup-bicep/15-private-network-standard-agent-setup#account-deletion-prerequisites-and-cleanup-guidance"
      echo ""
      
      wait_minutes=10
      wait_seconds=$((wait_minutes * 60))
      
      echo "⏰ Starting ${wait_minutes}-minute wait for subnet release..."
      echo "   Pipeline will resume at: $(date -u -d "+${wait_minutes} minutes" '+%Y-%m-%d %H:%M:%S UTC' 2>/dev/null || date -u '+%Y-%m-%d %H:%M:%S UTC')"
      echo ""
      
      # Progress indicator every 2 minutes
      interval=120  # 2 minutes
      elapsed=0
      
      while [ $elapsed -lt $wait_seconds ]; do
        remaining=$((wait_seconds - elapsed))
        remaining_minutes=$((remaining / 60))
        echo "  [$(date '+%H:%M:%S')] ⏳ ${remaining_minutes} minutes remaining..."
        
        # Sleep for interval or remaining time, whichever is less
        sleep_time=$interval
        if [ $remaining -lt $interval ]; then
          sleep_time=$remaining
        fi
        
        sleep $sleep_time
        elapsed=$((elapsed + sleep_time))
      done
      
      echo ""
      echo "✅ 10-minute wait complete!"
      echo "   Subnet should now be fully released and ready for reuse."
      echo "   Proceeding with pipeline..."
- task: AzureCLI@2
  displayName: '06d_Cleanup_Disconnected_SharedPrivateLinks'
  continueOnError: true
  condition: and(ne(variables['deleteAllServicesForProject'], 'true'), eq(variables['enableAISearchSharedPrivateLink'], 'true'), eq(variables['aiSearchExists'], 'true'))
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      #!/bin/bash
      # Pre-cleanup: delete any shared private links on AI Search that are in "Disconnected" state.
      # This happens when the Foundry account was previously deleted (06a/06b/06c) — the SPL target
      # no longer exists, so Azure transitions the SPL to "Disconnected". Bicep cannot update a
      # Disconnected SPL; it must be deleted first, then Bicep will re-create it.

      az account set --subscription "$(dev_test_prod_sub_id)"

      # Build resource group and AI Search name
      commonRGNamePrefix="$(admin_aifactoryPrefixRG)"
      projectNumber="$(project_number_000)"
      projectName="prj${projectNumber}"
      locationSuffix="$(admin_locationSuffix)"
      envName="$(dev_test_prod)"
      aifactorySuffixRG="$(admin_aifactorySuffixRG)"
      projectPrefix="$(projectPrefix)"
      projectSuffix="$(projectSuffix)"
      projectNameReplaced="${projectName/prj/project}"
      projectResourceGroup="${commonRGNamePrefix}${projectPrefix}${projectNameReplaced}-${locationSuffix}-${envName}${aifactorySuffixRG}${projectSuffix}"

      # Find AI Search by prefix (same pattern as 05b / delete script)
      safeNameAISearch="aisearch${projectName}${locationSuffix}${envName}"
      aisearch_name=$(az search service list \
        --resource-group "$projectResourceGroup" \
        --query "[?starts_with(name, '${safeNameAISearch}')].name" \
        -o tsv 2>/dev/null | tr -d '\r' | head -n1)

      if [ -z "$aisearch_name" ]; then
        echo "No AI Search service found with prefix $safeNameAISearch — nothing to clean up."
        exit 0
      fi

      echo "=== 06d Cleanup Disconnected / Failed Shared Private Links ==="
      echo "AI Search: $aisearch_name (rg=$projectResourceGroup)"

      # List all shared private links that are disconnected OR in failed provisioning state.
      # NOTE: Azure CLI/REST API always returns English enum values (Disconnected, Failed)
      # regardless of portal language. 'Bortkopplad' (Swedish) added as a defensive fallback.
      disconnected=$(az search shared-private-link-resource list \
        --resource-group "$projectResourceGroup" \
        --service-name "$aisearch_name" \
        --query "[?properties.status=='Disconnected' || properties.status=='Bortkopplad' || properties.provisioningState=='Failed'].name" \
        -o tsv 2>/dev/null | tr -d '\r' || echo "")

      if [ -z "$disconnected" ]; then
        echo "No disconnected or failed shared private links found — nothing to clean up."
        exit 0
      fi

      echo "Found disconnected/failed shared private links:"
      subscriptionId=$(az account show --query id -o tsv)
      while IFS= read -r spl_name; do
        if [ -n "$spl_name" ]; then
          echo "  Deleting disconnected SPL: $spl_name"
          rest_url="https://management.azure.com/subscriptions/${subscriptionId}/resourceGroups/${projectResourceGroup}/providers/Microsoft.Search/searchServices/${aisearch_name}/sharedPrivateLinkResources/${spl_name}?api-version=2025-02-01-preview"
          delete_ok=false
          for attempt in 1 2 3; do
            http_response=$(az rest --method DELETE --url "$rest_url" --headers "Content-Type=application/json" -o none 2>&1) && delete_ok=true && break
            echo "    Attempt $attempt failed: $http_response"
            sleep 10
          done
          if [ "$delete_ok" = true ]; then
            echo "    Delete accepted for $spl_name — waiting for provisioning..."
            for wait_i in $(seq 1 24); do
              spl_status=$(az rest --method GET --url "$rest_url" --query 'properties.provisioningState' -o tsv 2>/dev/null || echo "NotFound")
              if [ "$spl_status" = "NotFound" ] || [ -z "$spl_status" ]; then
                echo "    SPL $spl_name deleted successfully."
                break
              fi
              echo "    Waiting for delete... status=$spl_status (${wait_i}/24)"
              sleep 10
            done
          else
            echo "  Warning: Failed to delete $spl_name after 3 attempts"
          fi
        fi
      done <<< "$disconnected"

      echo "=== 06d Cleanup complete ==="
- task: AzureCLI@2
  displayName: '06e_Create_Policy_Exemptions_FoundrySubnets'
  continueOnError: true
  condition: and(ne(variables['deleteAllServicesForProject'], 'true'), ne(variables['policyExemptionAssignmentIds'], '[]'), ne(variables['policyExemptionAssignmentIds'], ''), succeeded())
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
     #!/bin/bash
     # Create policy exemptions on the VNet RG to guard Foundry ACA subnets from DINE remediation.
     # Requires Microsoft.Authorization/policyExemptions/write on the VNet RG.
     # continueOnError: true — missing RBAC is non-fatal; exemption is best-effort.
     #
     # To grant the required role to the deployment SP:
     #   az role assignment create --assignee <sp-object-id> \
     #     --role "Resource Policy Contributor" \
     #     --scope /subscriptions/<sub>/resourceGroups/<vnetRG>

     ASSIGNMENT_IDS_JSON='$(policyExemptionAssignmentIds)'
     SUBSCRIPTION_ID="$(dev_test_prod_sub_id)"
     VNET_RG="$(vnetResourceGroup_resolved)"

     if [ -z "$VNET_RG" ]; then
       VNET_RG="$(admin_aifactoryPrefixRG)$(vnetResourceGroupBase)-$(admin_locationSuffix)-$(dev_test_prod)$(admin_aifactorySuffixRG)"
     fi

     echo "=== 06e Create Policy Exemptions ==="
     echo "VNet RG: $VNET_RG"
     echo "Assignment IDs JSON: $ASSIGNMENT_IDS_JSON"

     az account set --subscription "$SUBSCRIPTION_ID"

     # Parse JSON array using Python (available on all ADO hosted agents)
     ASSIGNMENT_IDS=$(python3 -c "import json,sys; ids=json.loads(sys.argv[1]); print('\n'.join(ids))" "$ASSIGNMENT_IDS_JSON" 2>/dev/null || echo "")

     if [ -z "$ASSIGNMENT_IDS" ]; then
       echo "No policy assignment IDs configured — skipping."
       exit 0
     fi

     while IFS= read -r assignment_id; do
       [ -z "$assignment_id" ] && continue
       short_name=$(echo "$assignment_id" | awk -F'/' '{print $NF}')
       # 16-char hex suffix derived from assignment ID — stable across re-runs
       exemption_name="foundry-aca-$(echo -n "${assignment_id}" | md5sum | cut -c1-16)"
       echo "Creating exemption '$exemption_name' for assignment '$short_name'..."
       az rest --method PUT \
         --url "https://management.azure.com/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${VNET_RG}/providers/Microsoft.Authorization/policyExemptions/${exemption_name}?api-version=2022-07-01-preview" \
         --body "{\"properties\":{\"policyAssignmentId\":\"${assignment_id}\",\"exemptionCategory\":\"Waiver\",\"displayName\":\"Foundry ACA subnet exemption - ${short_name}\",\"description\":\"Foundry Standard Agent requires subnet immutability during network injection into snt-*-aca* subnets. DINE/auditIfNotExists remediation causes 409 conflicts on capability host provisioning.\"}}" \
         --headers "Content-Type=application/json" \
         && echo "✅ Exemption created: $exemption_name" \
         || echo "⚠️  Failed to create exemption $exemption_name — SP may lack Microsoft.Authorization/policyExemptions/write on $VNET_RG. Grant 'Resource Policy Contributor' to fix."
     done <<< "$ASSIGNMENT_IDS"

     echo "=== 06e Policy Exemptions complete ==="
- task: AzureCLI@2
  displayName: '05d_Build default image offline, to private registry (ACR) if not exists'
  condition: and(ne(variables['deleteAllServicesForProject'], 'true'), eq(variables['enableContainerApps'], 'true'), ne(variables['debug_disable_05_build_acr_image'], 'true'),ne(variables['disable_whitelisting_for_build_agents'], 'true'))
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |

      az account set --subscription "$(dev_test_prod_sub_id)"

      # Configuration flags
      use_public_image=true  # Set to true to use public image instead of building image
      mcr_ms_hello='mcr.microsoft.com/azuredocs/containerapps-helloworld:latest'
      
      # Create registry name from variables
      registryNameOrg="acrcommon$(aifactory_salt)$(admin_locationSuffix)$(admin_commonResourceSuffix)$(dev_test_prod)"
      registryName=$(echo "${registryNameOrg}" | tr -d '-')
      echo "Registry name: $registryName"
      
      # Set registry name for cleanup task
      echo "##vso[task.setvariable variable=acr_registry_name]$registryName"

      # Configure ACR export policy using REST API
      echo "Enabling ACR export policy"
      acrResourceGroup=$(az acr show --name $registryName --query resourceGroup -o tsv)
      echo "ACR Resource Group: $acrResourceGroup"
      az rest --method patch \
        --url "https://management.azure.com/subscriptions/$(dev_test_prod_sub_id)/resourceGroups/$acrResourceGroup/providers/Microsoft.ContainerRegistry/registries/$registryName?api-version=2023-07-01" \
        --body '{"properties":{"policies":{"exportPolicy":{"status":"enabled"}}}}'

      # Configure ACR for selective network access first
      echo "Configuring ACR for selective network access"
      az acr update --name $registryName --public-network-enabled true --default-action Deny
      
      # Wait for network rules to propagate
      echo "Waiting for network rules to propagate..."
      sleep 15
      
      # Get current IP addresses
      echo "Getting current IP addresses right before ACR operations..."
      CURRENT_IP1=$(curl -s http://ipinfo.io/ip 2>/dev/null || echo "")
      CURRENT_IP2=$(curl -s https://api.ipify.org 2>/dev/null || echo "")
      CURRENT_IP3=$(curl -s https://checkip.amazonaws.com 2>/dev/null || echo "")
      CURRENT_IP4=$(curl -s https://icanhazip.com 2>/dev/null || echo "")
      
      echo "Current IPs detected: $CURRENT_IP1, $CURRENT_IP2, $CURRENT_IP3, $CURRENT_IP4"
      
      # Store IPs that we actually add for cleanup - using pipeline variables
      ADDED_IPS_LIST=""
      SUCCESSFULLY_ADDED_IPS=""
      
      # Helper function to add IP with duplicate check
      add_ip_to_acr() {
        local ip="$1"
        local description="$2"
        
        echo "Adding $description: $ip"
        
        # Try to add the IP and capture both output and exit code
        local result
        result=$(az acr network-rule add --name $registryName --ip-address "$ip" 2>&1)
        local exit_code=$?
        
        if [ $exit_code -eq 0 ]; then
          echo "Successfully added: $ip"
          SUCCESSFULLY_ADDED_IPS="$SUCCESSFULLY_ADDED_IPS,$ip"
          return 0
        elif echo "$result" | grep -q "duplicate"; then
          echo "IP $ip already exists in ACR rules (duplicate) - skipping"
          return 0
        else
          echo "Failed to add $ip: $result"
          return 1
        fi
      }
      
      # Add broader IP ranges for Azure DevOps agents
      echo "Adding Azure DevOps service IP ranges (more permissive approach)"
      
      PRIMARY_IP=$(curl -s http://ipinfo.io/ip 2>/dev/null)
      if [ -n "$PRIMARY_IP" ]; then
        IP_BASE_16=$(echo $PRIMARY_IP | cut -d'.' -f1-2)
        BROAD_RANGE_16="${IP_BASE_16}.0.0/16"
        add_ip_to_acr "$BROAD_RANGE_16" "very broad IP range"
        
        IP_BASE_24=$(echo $PRIMARY_IP | cut -d'.' -f1-3)
        BROAD_RANGE_24="${IP_BASE_24}.0/24"
        add_ip_to_acr "$BROAD_RANGE_24" "broad IP range"
      fi
      
      # Add common Azure DevOps IP ranges
      AZURE_DEVOPS_RANGES=(
        "13.107.6.0/24"
        "13.107.9.0/24"
        "13.107.42.0/24"
        "13.107.43.0/24"
        "104.208.0.0/16"
        "52.0.0.0/8"
        "13.0.0.0/8"
        "150.171.22.0/24"
        "150.171.23.0/24"
        "150.171.73.0/24"
        "150.171.74.0/24"
        "150.171.75.0/24"
        "150.171.76.0/24"
      )
      
      for range in "${AZURE_DEVOPS_RANGES[@]}"; do
        add_ip_to_acr "$range" "Azure DevOps IP range"
      done
      
      # Add individual detected IPs as backup (with duplicate detection)
      CURRENT_IPS=("$CURRENT_IP1" "$CURRENT_IP2" "$CURRENT_IP3" "$CURRENT_IP4")
      PROCESSED_IPS=()
      
      for current_ip in "${CURRENT_IPS[@]}"; do
        if [ -n "$current_ip" ]; then
          # Check if we've already processed this IP
          if [[ " ${PROCESSED_IPS[@]} " =~ " ${current_ip} " ]]; then
            echo "IP $current_ip already processed - skipping duplicate"
            continue
          fi
          
          add_ip_to_acr "$current_ip" "detected IP"
          PROCESSED_IPS+=("$current_ip")
        fi
      done
      
      # Store only the successfully added IPs for cleanup (remove leading comma)
      SUCCESSFULLY_ADDED_IPS=$(echo "$SUCCESSFULLY_ADDED_IPS" | sed 's/^,//')
      echo "##vso[task.setvariable variable=acr_added_ips]$SUCCESSFULLY_ADDED_IPS"
      echo "Successfully added IPs for cleanup: $SUCCESSFULLY_ADDED_IPS"
      
      # Wait for network rules to propagate
      echo "Waiting for network rules to propagate..."
      sleep 30
      
      # Now check if image already exists (after network access is configured)
      echo "Checking if image containerapps-default:latest already exists in ACR..."
      if az acr repository show --name $registryName --image containerapps-default:latest &> /dev/null; then
        echo "✅ Image containerapps-default:latest already exists in ACR. Skipping image creation but keeping IP rules for cleanup."
        # Note: We keep the SUCCESSFULLY_ADDED_IPS for cleanup, don't exit early
      else
        echo "❌ Image containerapps-default:latest does not exist. Proceeding with image creation..."
        
        # Create the image
        echo "Creating new image containerapps-default:latest..."
        
        if [ "$use_public_image" = true ]; then
          echo "Using public image: $mcr_ms_hello"
          timestamp=$(date +%Y%m%d-%H%M%S)
          
          echo "Importing public image to ACR with latest tag..."
          az acr import --name $registryName \
                        --source $mcr_ms_hello \
                        --image containerapps-default:latest \
                        --force
          
          echo "Importing public image to ACR with timestamp tag..."
          az acr import --name $registryName \
                        --source $mcr_ms_hello \
                        --image containerapps-default:$timestamp \
                        --force
          
          echo "Public image imported to ACR successfully!"
        else
          echo "Building custom image using ACR build..."
          az acr build --registry $registryName \
                       --image containerapps-default:latest \
                       --file azure-enterprise-scale-ml/environment_setup/aifactory/dockerfiles/acaDefault/Dockerfile \
                       azure-enterprise-scale-ml/environment_setup/aifactory/dockerfiles/acaDefault/
        fi
      fi

      # Verify image exists (whether it was already there or just created)
      sleep 30
      if az acr repository show --name $registryName --image containerapps-default:latest &> /dev/null; then
        echo "✅ Image verified successfully in ACR."
      else
        echo "❌ Failed to verify image in ACR"
        exit 1
      fi
    workingDirectory: '$(System.DefaultWorkingDirectory)'
- task: AzureCLI@2
  displayName: 'Check and Delete Orphan Role Assignments'
  condition: and(succeeded(), ne(variables['deleteAllServicesForProject'], 'true'))
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      set -e
      
      echo "Checking for orphan role assignments..."
      
      # Set subscription
      az account set --subscription "$(dev_test_prod_sub_id)"
      
      # Input parameters
      commonRGNamePrefix="$(admin_aifactoryPrefixRG)"
      projectNumber="$(project_number_000)"
      projectName="prj${projectNumber}"
      locationSuffix="$(admin_locationSuffix)"
      envName="$(dev_test_prod)"
      aifactorySuffixRG="$(admin_aifactorySuffixRG)"
      vnetResourceGroupBase="$(vnetResourceGroupBase)"
      
      # Set project prefix and suffix from pipeline variables
      projectPrefix="$(projectPrefix)"
      projectSuffix="$(projectSuffix)"
      
      # Construct common resource group name
      commonResourceGroup="${commonRGNamePrefix}${vnetResourceGroupBase}-${locationSuffix}-${envName}${aifactorySuffixRG}"
      echo "commonResourceGroup resolved to: $commonResourceGroup"
      
      # Construct project resource group name
      projectNameReplaced="${projectName/prj/project}"
      projectResourceGroup="${commonRGNamePrefix}${projectPrefix}${projectNameReplaced}-${locationSuffix}-${envName}${aifactorySuffixRG}${projectSuffix}"
      echo "projectResourceGroup resolved to: $projectResourceGroup"
      
      # Function to check and delete orphan role assignments
      check_and_delete_orphans() {
        local resourceGroup=$1
        local rgScope="/subscriptions/$(dev_test_prod_sub_id)/resourceGroups/${resourceGroup}"
        
        echo "Checking resource group: $resourceGroup"
        echo "Scope: $rgScope"
        
        # Check if resource group exists
        if ! az group show --name "$resourceGroup" &>/dev/null; then
          echo "Resource group $resourceGroup does not exist, skipping..."
          return 0
        fi
        
        # Get orphan role assignments
        orphanCount=$(az role assignment list --scope "$rgScope" --query "[?principalName==null]" -o tsv | wc -l)
        
        if [ "$orphanCount" -gt 0 ]; then
          echo "Found $orphanCount orphan role assignment(s) in $resourceGroup"
          
          # Get orphan role assignment IDs
          orphanIds=$(az role assignment list --scope "$rgScope" --query "[?principalName==null].id" -o tsv)
          
          # Delete each orphan role assignment
          while IFS= read -r assignmentId; do
            if [ -n "$assignmentId" ]; then
              echo "Attempting to delete orphan role assignment: $assignmentId"
              
              if az role assignment delete --ids "$assignmentId" 2>&1; then
                echo "Successfully deleted orphan role assignment: $assignmentId"
              else
                echo "Warning: Failed to delete orphan role assignment: $assignmentId (may require additional permissions)"
              fi
            fi
          done <<< "$orphanIds"
        else
          echo "No orphan role assignments found in $resourceGroup"
        fi
      }
      
      # Check common resource group
      if [ -n "$commonResourceGroup" ]; then
        echo "=== Checking Common Resource Group ==="
        check_and_delete_orphans "$commonResourceGroup" || echo "Warning: Error processing common resource group, continuing..."
      fi
      
      # Check project resource group
      if [ -n "$projectResourceGroup" ]; then
        echo ""
        echo "=== Checking Project Resource Group ==="
        check_and_delete_orphans "$projectResourceGroup" || echo "Warning: Error processing project resource group, continuing..."
      fi
      
      echo ""
      echo "Orphan role assignment check completed"


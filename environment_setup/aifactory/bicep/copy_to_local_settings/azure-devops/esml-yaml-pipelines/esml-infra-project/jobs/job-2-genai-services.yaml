parameters:
  - name: serviceConnection
    type: string
  - name: serviceConnectionSeeding
    type: string
  - name: phase
    type: string
    default: 'infra'
    values:
      - infra
      - foundry

steps:
# ---------------------------------------------------------------------------
# PREFLIGHT (early, fail-fast): validate AI Search/model quota, Elasticsearch
# policy/RP blocks, resource-provider registration and region support for THIS
# stage's subscription BEFORE any service is deployed. A non-zero exit aborts
# the stage with a clear reason (surfaced via ##vso[task.logissue type=error]).
# Set preflight_skip=true (pipeline variable) to bypass; preflight_strict=true
# to also fail on warnings.
# ---------------------------------------------------------------------------
- task: AzureCLI@2
  displayName: '00_preflight_quota_policy_checks'
  condition: ne(variables['debug_disable_validation_tasks'], 'true')
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    scriptLocation: scriptPath
    scriptPath: '$(System.DefaultWorkingDirectory)/azure-enterprise-scale-ml/environment_setup/aifactory/bicep/scripts/preflight.sh'
    arguments: '--environment "$(dev_test_prod)" --subscription "$(dev_test_prod_sub_id)" --location "$(admin_location)"'
  env:
    PREFLIGHT_SKIP: $(preflight_skip)
    admin_location: $(admin_location)
    admin_aiSearchTier: $(admin_aiSearchTier)
    enableAISearch: $(enableAISearch)
    enableAIFoundry: $(enableAIFoundry)
    enableAzureOpenAI: $(enableAzureOpenAI)
    enableCosmosDB: $(enableCosmosDB)
    enableElasticsearch: $(enableElasticsearch)
    deployModel_gpt_X: $(deployModel_gpt_X)
    modelGPTXName: $(modelGPTXName)
    modelGPTXSku: $(modelGPTXSku)
    modelGPTXCapacity: $(modelGPTXCapacity)
    deployModel_gpt_4o: $(deployModel_gpt_4o)
    deployModel_text_embedding_3_large: $(deployModel_text_embedding_3_large)
    deployModel_text_embedding_3_small: $(deployModel_text_embedding_3_small)
    deployModel_text_embedding_ada_002: $(deployModel_text_embedding_ada_002)
    default_model_sku: $(default_model_sku)
    default_gpt_capacity: $(default_gpt_capacity)
    default_embedding_capacity: $(default_embedding_capacity)
    # --- Settings consumed by the static preflight categories (Config/BYO/CIDR/AKS/Security/regional-DB).
    #     CLI args are unchanged; these only feed the new checks via getval() env lookup. ---
    BYO_subnets: $(BYO_subnets)
    common_vnet_cidr: $(common_vnet_cidr)
    common_subnet_cidr: $(common_subnet_cidr)
    common_subnet_scoring_cidr: $(common_subnet_scoring_cidr)
    common_pbi_subnet_cidr: $(common_pbi_subnet_cidr)
    common_bastion_subnet_cidr: $(common_bastion_subnet_cidr)
    dev_cidr_range: $(dev_cidr_range)
    test_cidr_range: $(test_cidr_range)
    prod_cidr_range: $(prod_cidr_range)
    subnetCommon: $(subnetCommon)
    subnetCommonScoring: $(subnetCommonScoring)
    subnetCommonPowerbiGw: $(subnetCommonPowerbiGw)
    subnetProjGenAI: $(subnetProjGenAI)
    subnetProjAKS: $(subnetProjAKS)
    subnetProjAKS2: $(subnetProjAKS2)
    subnetProjACA: $(subnetProjACA)
    subnetProjACA2: $(subnetProjACA2)
    subnetProjWebapp: $(subnetProjWebapp)
    subnetProjDatabricksPublic: $(subnetProjDatabricksPublic)
    subnetProjDatabricksPrivate: $(subnetProjDatabricksPrivate)
    byoASEv3: $(byoASEv3)
    byoAseFullResourceId: $(byoAseFullResourceId)
    byoAseAppServicePlanResourceId: $(byoAseAppServicePlanResourceId)
    aksEnablePrivateCluster: $(aksEnablePrivateCluster)
    aksOutboundType: $(aksOutboundType)
    aksPrivateDNSZone: $(aksPrivateDNSZone)
    aksAzureFirewallPrivateIp: $(aksAzureFirewallPrivateIp)
    enableAKS: $(enableAKS)
    enableAksForAzureML: $(enableAksForAzureML)
    enableWebApp: $(enableWebApp)
    enableFunction: $(enableFunction)
    enableContainerApps: $(enableContainerApps)
    enableDatabricks: $(enableDatabricks)
    disableAgentNetworkInjection: $(disableAgentNetworkInjection)
    enableRedisCache: $(enableRedisCache)
    enablePostgreSQL: $(enablePostgreSQL)
    enableSQLDatabase: $(enableSQLDatabase)
    project_IP_whitelist: $(project_IP_whitelist)
    acr_IP_whitelist: $(acr_IP_whitelist)
- task: AzureCLI@2
  displayName: '00_resolve_network_env_placeholders'
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      #!/bin/bash

      # ---------------------------------------------------------------
      # ULTRA DELETE MODE PROMOTION (must run FIRST, before any condition is evaluated)
      # When deleteAllForProject=true, force the two upstream delete flags to true so:
      #   - All 61–68 / 69 / 99 / 100 / 101 / 100a / 100b / dashboards CREATION tasks
      #     (already gated on `ne(deleteAllServicesForProject, 'true')`) SKIP.
      #   - 06a_Delete_CapabilityHosts runs (gated on deleteAllServicesForProject=true).
      #   - 06b_Delete_Service_If_Not_Enabled_And_Exists runs (gated on
      #     enableDeleteForDisabledResources=true) and its `delete-services-if-disabled.sh`
      #     script sees deleteAllForProject=true and tears down the project RG.
      #   - 06c_Purge_SoftDeleted runs.
      #   - 06c2 (subnet-release wait) is excluded (no redeploy follows).
      #   - 07/08 firewall-cleanup tasks already run via `always()`.
      # ---------------------------------------------------------------
      if [ "$(deleteAllForProject)" = "true" ]; then
        echo "💀 ULTRA DELETE MODE detected (deleteAllForProject=true) — promoting upstream flags:"
        echo "   - deleteAllServicesForProject -> true (skips ALL creation tasks)"
        echo "   - enableDeleteForDisabledResources -> true (enables 06b delete-services script)"
        echo "##vso[task.setvariable variable=deleteAllServicesForProject]true"
        echo "##vso[task.setvariable variable=enableDeleteForDisabledResources]true"
      fi

      # ---------------------------------------------------------------
      # BYO_subnets guard: evaluated FIRST before any variable usage.
      # When BYO_subnets=false (default), network_env and all subnet name
      # variables are documentation examples only and must be treated as
      # empty so Bicep and the PS1 script fall back to their own naming
      # conventions (snt-prj003-genai, snet-esml-cmn-001, etc.).
      # When BYO_subnets=true, the values from variables.yaml are used.
      # ---------------------------------------------------------------
      BYO="$(BYO_subnets)"
      if [ "$BYO" = "true" ]; then
        NETWORK_ENV="$(network_env)"
        echo "BYO_subnets=true: using network_env=$NETWORK_ENV and provided subnet names"
      else
        NETWORK_ENV=""
        echo "BYO_subnets=false: network_env forced to empty; Bicep/PS1 will use naming convention"
        echo "##vso[task.setvariable variable=network_env]"
        echo "##vso[task.setvariable variable=subnetCommon]"
        echo "##vso[task.setvariable variable=subnetCommonScoring]"
        echo "##vso[task.setvariable variable=subnetCommonPowerbiGw]"
        echo "##vso[task.setvariable variable=subnetProjGenAI]"
        echo "##vso[task.setvariable variable=subnetProjAKS]"
        echo "##vso[task.setvariable variable=subnetProjAKS2]"
        echo "##vso[task.setvariable variable=subnetProjACA]"
        echo "##vso[task.setvariable variable=subnetProjACA2]"
        echo "##vso[task.setvariable variable=subnetProjDatabricksPublic]"
        echo "##vso[task.setvariable variable=subnetProjDatabricksPrivate]"
      fi

      VNET_RG="$(vnetResourceGroup_param)"
      VNET_NAME="$(vnetNameFull_param)"

      echo "Original vnetResourceGroup_param: $VNET_RG"
      echo "Original vnetNameFull_param: $VNET_NAME"
      echo "network_env value: $NETWORK_ENV"

      # Replace <network_env> placeholder in VNET_RG if it exists
      if [[ "$VNET_RG" == *"<network_env>"* ]]; then
        echo "Found <network_env> placeholder in vnetResourceGroup_param"
        VNET_RG="${VNET_RG//<network_env>/$NETWORK_ENV}"
        echo "Replaced with network_env value: $NETWORK_ENV"
      fi

      # Replace <network_env> placeholder in VNET_NAME if it exists
      if [[ "$VNET_NAME" == *"<network_env>"* ]]; then
        echo "Found <network_env> placeholder in vnetNameFull_param"
        VNET_NAME="${VNET_NAME//<network_env>/$NETWORK_ENV}"
        echo "Replaced with network_env value: $NETWORK_ENV"
      fi

      # If VNET variables are not set (empty or unexpanded), use naming convention
      if [ -z "$VNET_NAME" ] || [[ "$VNET_NAME" == \$\(vnetNameFull_param\)* ]]; then
        VNET_NAME="$(vnetNameBase)-$(admin_locationSuffix)-$(dev_test_prod)$(admin_commonResourceSuffix)"
        echo "VNET name not set, using naming convention: $VNET_NAME"
      else
        echo "Using provided VNET name: $VNET_NAME"
      fi

      if [ -z "$VNET_RG" ] || [[ "$VNET_RG" == \$\(vnetResourceGroup_param\)* ]]; then
        VNET_RG="$(admin_aifactoryPrefixRG)$(vnetResourceGroupBase)-$(admin_locationSuffix)-$(dev_test_prod)$(admin_aifactorySuffixRG)"
        echo "VNET resource group not set, using naming convention: $VNET_RG"
      else
        echo "Using provided VNET resource group: $VNET_RG"
      fi

      # Set resolved values as pipeline variables for reuse
      echo "##vso[task.setvariable variable=vnetResourceGroup_resolved]$VNET_RG"
      echo "##vso[task.setvariable variable=vnetNameFull_resolved]$VNET_NAME"

      echo "Resolved vnetResourceGroup: $VNET_RG"
      echo "Resolved vnetNameFull: $VNET_NAME"
      echo "Variables set: vnetResourceGroup_resolved, vnetNameFull_resolved, network_env=$NETWORK_ENV"
- task: AzureCLI@2
  displayName: '00_validate_project_subnet_exists'
  condition: and(ne(variables['debug_disable_validation_tasks'], 'true'), ne(variables['BYO_subnets'], 'true'), ne(variables['deleteAllForProject'], 'true'))
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      #!/bin/bash
      
      az account set --subscription "$(dev_test_prod_sub_id)"
      
      # Construct subnet name based on project number
      PROJECT_SUBNET_NAME="snt-prj$(project_number_000)-aks"
      echo "Checking for subnet: $PROJECT_SUBNET_NAME"
      
      # Get vnet information from variables, with fallback to naming convention
      VNET_NAME="$(vnetNameFull_param)"
      VNET_RG="$(vnetResourceGroup_resolved)"

      # If VNET variables are not set (empty or unexpanded), use naming convention
      if [ -z "$VNET_NAME" ] || [[ "$VNET_NAME" == \$\(vnetNameFull_param\)* ]]; then
        VNET_NAME="$(vnetNameBase)-$(admin_locationSuffix)-$(dev_test_prod)$(admin_commonResourceSuffix)"
        echo "VNET name not set, using naming convention: $VNET_NAME"
      else
        echo "Using provided VNET name: $VNET_NAME"
      fi
      
      if [ -z "$VNET_RG" ] || [[ "$VNET_RG" == \$\(vnetResourceGroup_param\)* ]]; then
        # Use the common resource group naming convention
        VNET_RG="$(admin_aifactoryPrefixRG)$(vnetResourceGroupBase)-$(admin_locationSuffix)-$(dev_test_prod)$(admin_aifactorySuffixRG)"
        echo "VNET resource group not set, using naming convention: $VNET_RG"
      else
        echo "Using provided VNET resource group: $VNET_RG"
      fi
      
      echo "VNET Name: $VNET_NAME"
      echo "VNET Resource Group: $VNET_RG"
      
      # First check if VNET exists
      if ! az network vnet show --name "$VNET_NAME" --resource-group "$VNET_RG" &> /dev/null; then
        echo "❌ ERROR: VNET '$VNET_NAME' does not exist in resource group '$VNET_RG'"
        echo "Please ensure the common networking infrastructure is deployed first."
        exit 1
      fi
      
      # Check if project AKS subnet exists
      if az network vnet subnet show --name "$PROJECT_SUBNET_NAME" --vnet-name "$VNET_NAME" --resource-group "$VNET_RG" &> /dev/null; then
        echo "✅ Subnet '$PROJECT_SUBNET_NAME' exists. Continuing with deployment."
      else
        echo "❌ ERROR: Subnet '$PROJECT_SUBNET_NAME' does not exist in vnet '$VNET_NAME'"
        echo ""
        echo "Required subnet missing for GenAI services deployment."
        echo "Solutions:"
        echo "1. Set 'runNetworkingVar' to 'true' if this is the first time setting up this project"
        echo "2. Ensure project-specific networking has been deployed"
        echo "3. Verify the project number $(project_number_000) is correct"
        echo ""
        echo "Expected subnet name: $PROJECT_SUBNET_NAME"
        echo "Target VNET: $VNET_NAME"
        echo "Target Resource Group: $VNET_RG"
        echo ""
        echo "Failing pipeline..."
        exit 1
      fi

- task: PowerShell@2
  displayName: '00_check_for_submodule'
  condition: ne(variables['debug_disable_validation_tasks'], 'true')
  inputs:
    targetType: 'inline'
    script: |
      Write-Host "=== MANUAL SUBMODULE INITIALIZATION ==="
      Write-Host "Current directory: $(Get-Location)"
      Write-Host "Working directory: $(System.DefaultWorkingDirectory)"
      
      # Change to the repository root
      Set-Location "$(System.DefaultWorkingDirectory)"
      Write-Host "Changed to: $(Get-Location)"
      
      # Check if .gitmodules exists
      if (Test-Path ".gitmodules") {
        Write-Host "✅ .gitmodules file found"
        Write-Host "Contents of .gitmodules:"
        Get-Content ".gitmodules"
        
        # Initialize and update submodules manually
        Write-Host "Running: git submodule init"
        git submodule init
        
        Write-Host "Running: git submodule update --recursive"
        git submodule update --recursive
        
        Write-Host "Submodule branch information:"
        cd azure-enterprise-scale-ml
        $currentBranch = git branch --show-current
        if ($currentBranch) {
          Write-Host "✅ Current branch: $currentBranch"
        } else {
          Write-Host "✅ Detached HEAD - checking commit info:"
          $commitInfo = git log --oneline -1
          Write-Host "   Current commit: $commitInfo"
        }
        
        Write-Host "Available branches:"
        git branch -a | ForEach-Object { 
          $branch = $_.Trim()
          if ($branch -match "remotes/origin/(main|release/.*)") {
            Write-Host "   $branch"
          }
        }
        cd ..
      } else {
        Write-Host "❌ .gitmodules file NOT found"
      }
      
      Write-Host "Final directory contents:"
      Get-ChildItem | Format-Table Name, IsDirectory
      Write-Host "=== END MANUAL SUBMODULE INIT ==="

- task: AzureCLI@2
  displayName: '00_generate_deployment_random_value'
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: pscore
    scriptLocation: inlineScript
    inlineScript: |
      # Generate a random deployment ID for this entire pipeline run
      $randomValue = [System.Guid]::NewGuid().ToString("N").Substring(0, 10)
      Write-Host "Generated deployment random value: $randomValue"
      echo "##vso[task.setvariable variable=deployment_random_value]$randomValue"
      
      Write-Host ""
      # Write-Host "Sleeping 15 minutes to allow Azure resource propagation..."
      # Start-Sleep -Seconds 900
      Write-Host "Sleep complete — resuming pipeline."

- task: AzureCLI@2
  displayName: '110_Cleanup_CapabilityHosts_Before_AccountDeletion'
  continueOnError: true
  # SCOPED CLEANUP (do NOT use failed() — it fires on ANY prior task failure,
  # which would wipe healthy caphosts when e.g. task 62 cognitive-services fails).
  #
  # Runs ONLY when:
  #  (1) Task 69a actually started but did not reach 'Succeeded' (foundry_69a_started=true
  #      AND foundry_69a_deployment_succeeded != true), i.e. account-creation failed.
  #  (2) Task 69b actually started but did not reach success marker
  #      (foundry_69b_started=true AND foundry_69b_succeeded != true), i.e. project-update failed.
  #  (3) ULTRA delete mode (deleteAllForProject=true) — belt-and-braces caphost cleanup
  #      before delete-services-if-disabled.sh removes the project RG.
  #
  # If task 62 / 63 / etc. failed BEFORE 69a, the started markers are never set
  # (69a/69b's own conditions require pre_foundry_gate_passed=true and succeeded()),
  # so 110 stays skipped and any healthy caphost from a prior run is preserved.
  condition: and(or(and(eq(variables['foundry_69a_started'], 'true'), ne(variables['foundry_69a_deployment_succeeded'], 'true')), and(eq(variables['foundry_69b_started'], 'true'), ne(variables['foundry_69b_succeeded'], 'true')), eq(variables['deleteAllForProject'], 'true')), eq(variables['enableAIFoundry'], 'true'), eq(variables['enableAFoundryCaphost'], 'true'))
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    scriptLocation: scriptPath
    scriptPath: '$(System.DefaultWorkingDirectory)/azure-enterprise-scale-ml/environment_setup/aifactory/bicep/scripts/ado/74_Cleanup_CapabilityHosts.sh'
    arguments: $(dev_test_prod_sub_id) $(admin_aifactoryPrefixRG) $(project_number_000) $(admin_locationSuffix) $(dev_test_prod) $(admin_aifactorySuffixRG) $(admin_prjResourceSuffix) $(aifactory_salt) $(aifactory_salt_random) $(deployment_random_value) $(projectPrefix) $(projectSuffix)
    workingDirectory: '$(System.DefaultWorkingDirectory)/azure-enterprise-scale-ml/environment_setup/aifactory/bicep'
- task: AzureCLI@2
  displayName: '111_If_Error_AIFoundryHubAndProject_DeleteIt'

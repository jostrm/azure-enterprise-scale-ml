      - name: 69c_cosmosdb_data_contributor_for_foundry_project
        if: success() && env.enableAIFoundry == 'true' && env.enableCosmosDB == 'true' && env.deleteAllServicesForProject != 'true'
        continue-on-error: true
        uses: azure/cli@v2
        env:
          aifactory_salt: ${{ env.AIFACTORY_SALT }}
          aifactory_salt_random: ${{ env.aifactory_salt_random }}
        with:
          azcliversion: latest
          inlineScript: |
            set -e
            export MSYS_NO_PATHCONV=1

            az account set --subscription "${{ env.dev_test_prod_sub_id }}"

            commonRGNamePrefix="${{ env.admin_aifactoryPrefixRG }}"
            projectNumber="${{ env.project_number_000 }}"
            projectName="prj${projectNumber}"
            locationSuffix="${{ env.admin_locationSuffix }}"
            envName="${{ env.dev_test_prod }}"
            aifactorySuffixRG="${{ env.admin_aifactorySuffixRG }}"
            projectPrefix="${{ env.projectPrefix }}"
            projectSuffix="${{ env.projectSuffix }}"
            projectNameReplaced="${projectName/prj/project}"
            projectResourceGroup="${commonRGNamePrefix}${projectPrefix}${projectNameReplaced}-${locationSuffix}-${envName}${aifactorySuffixRG}${projectSuffix}"

            echo "=== Cosmos DB Data Contributor RBAC for AI Foundry project ==="
            echo "Resource group: $projectResourceGroup"

            # 1. Discover AI Foundry account and project
            foundry_account_name=$(az cognitiveservices account list \
              --subscription "${{ env.dev_test_prod_sub_id }}" \
              --resource-group "$projectResourceGroup" \
              --query "[?starts_with(name, 'aif2') && !starts_with(name, 'aif2-p')].name | [0]" -o tsv 2>/dev/null || echo "")

            if [ -z "$foundry_account_name" ]; then
              echo "No AI Foundry account found in $projectResourceGroup. Skipping."
              exit 0
            fi
            echo "AI Foundry account: $foundry_account_name"

            foundry_account_id=$(az cognitiveservices account show \
              --name "$foundry_account_name" \
              --resource-group "$projectResourceGroup" \
              --query "id" -o tsv)

            # Find project and its system-assigned identity
            project_json=$(az rest --method GET \
              --url "https://management.azure.com${foundry_account_id}/projects?api-version=2025-04-01-preview" \
              -o json 2>/dev/null | tr -d '\r' || echo '{"value":[]}')

            project_principal_id=$(echo "$project_json" | jq -r \
              '[.value[] | select(.identity.principalId != null and .identity.principalId != "")] | .[0].identity.principalId // empty')

            # Fallback: construct project name from salt
            if [ -z "$project_principal_id" ]; then
              echo "REST list did not return a principalId. Trying fallback."
              uniqueInAIFenv="${aifactory_salt}"
              saltRandom10="${aifactory_salt_random}"
              if [ -n "$uniqueInAIFenv" ] && [ -n "$saltRandom10" ]; then
                cleanRandomValue="${saltRandom10//-/}"
                cleanRandomValue="${cleanRandomValue//_/}"
                cleanRandomValue=$(echo "$cleanRandomValue" | awk '{print tolower($0)}')
                foundry_project_name=$(echo "aif2-p${projectNumber}${uniqueInAIFenv}${cleanRandomValue}" | awk '{print tolower($0)}' | cut -c1-12)
                echo "Fallback: trying project name='$foundry_project_name'"
                fallback_json=$(az rest --method GET \
                  --url "https://management.azure.com${foundry_account_id}/projects/${foundry_project_name}?api-version=2025-04-01-preview" \
                  -o json 2>/dev/null | tr -d '\r' || echo '{}')
                project_principal_id=$(echo "$fallback_json" | jq -r '.identity.principalId // empty')
              fi
            fi

            if [ -z "$project_principal_id" ]; then
              echo "No AI Foundry project with system-assigned identity found. Skipping."
              exit 0
            fi
            echo "Project system-assigned identity (principalId): $project_principal_id"

            # 2. Discover CosmosDB account
            cosmos_account_name=$(az cosmosdb list \
              --resource-group "$projectResourceGroup" \
              --query "[?starts_with(name, 'cosmos-')].name | [0]" -o tsv 2>/dev/null || echo "")

            if [ -z "$cosmos_account_name" ]; then
              echo "No Cosmos DB account found in $projectResourceGroup. Skipping."
              exit 0
            fi
            echo "Cosmos DB account: $cosmos_account_name"

            # 3. Assign Cosmos DB Built-in Data Contributor
            role_definition_id="/subscriptions/${{ env.dev_test_prod_sub_id }}/resourceGroups/${projectResourceGroup}/providers/Microsoft.DocumentDB/databaseAccounts/${cosmos_account_name}/sqlRoleDefinitions/00000000-0000-0000-0000-000000000002"

            echo "Assigning Cosmos DB Built-in Data Contributor role..."
            assign_output=$(az cosmosdb sql role assignment create \
              --account-name "$cosmos_account_name" \
              --resource-group "$projectResourceGroup" \
              --principal-id "$project_principal_id" \
              --role-definition-id "$role_definition_id" \
              --scope "/" 2>&1) && assign_rc=0 || assign_rc=$?

            if [ $assign_rc -eq 0 ]; then
              echo "Cosmos DB Data Contributor role assigned successfully."
            else
              if echo "$assign_output" | grep -qi "already exists\|conflict\|RoleAssignmentAlreadyExists"; then
                echo "::warning::Role assignment already exists. Desired RBAC state is achieved."
              else
                echo "::warning::Role assignment command failed (rc=$assign_rc), but continuing pipeline."
                echo "$assign_output"
              fi
            fi

            echo "=== 69c completed ==="

      - name: 100a_approve_AI_Search_shared_private_links
        if: |
          success() && env.deleteAllServicesForProject != 'true' &&
          env.enableAISearchSharedPrivateLink == 'true' &&
          ((env.enableAIFoundry == 'true' && env.enableAFoundryCaphost == 'true') || env.enableAISearch == 'true')
        continue-on-error: true
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -e
            export MSYS_NO_PATHCONV=1

            az account set --subscription "${{ env.dev_test_prod_sub_id }}"

            commonRGNamePrefix="${{ env.admin_aifactoryPrefixRG }}"
            projectNumber="${{ env.project_number_000 }}"
            locationSuffix="${{ env.admin_locationSuffix }}"
            envName="${{ env.dev_test_prod }}"
            aifactorySuffixRG="${{ env.admin_aifactorySuffixRG }}"
            projectPrefix="${{ env.projectPrefix }}"
            projectSuffix="${{ env.projectSuffix }}"
            projectResourceGroup="${commonRGNamePrefix}${projectPrefix}project${projectNumber}-${locationSuffix}-${envName}${aifactorySuffixRG}${projectSuffix}"

            echo "=== Approve AI Search Shared Private Links ==="
            echo "Resource group: $projectResourceGroup"

            total_approved=0
            total_failed=0

            approve_pending_connections() {
              local resource_type="$1"
              local resource_url="$2"
              local api_version="$3"

              echo ""
              echo "--- $resource_type ---"
              local connections
              connections=$(az rest --method GET \
                --url "${resource_url}?api-version=${api_version}" \
                -o json 2>/dev/null || echo '{"value":[]}')

              local pending
              pending=$(echo "$connections" | jq -r '.value[] | select(.properties.privateLinkServiceConnectionState.status == "Pending") | .name | split("/") | .[-1]' | tr -d '\r')

              if [ -z "$pending" ]; then
                echo "  No pending connections found."
                return
              fi

              for conn_name in $pending; do
                echo "  Approving: $conn_name ..."
                local approve_result rc
                approve_result=$(az rest --method PUT \
                  --url "${resource_url}/${conn_name}?api-version=${api_version}" \
                  --body '{"properties":{"privateLinkServiceConnectionState":{"status":"Approved","description":"Approved by AIFactory pipeline - AI Search shared private link"}}}' \
                  --headers "Content-Type=application/json" \
                  -o json 2>&1) && rc=0 || rc=$?
                if [ $rc -eq 0 ]; then
                  echo "    Approved: $conn_name"
                  total_approved=$((total_approved + 1))
                else
                  echo "    Failed: $conn_name"
                  echo "    $approve_result"
                  total_failed=$((total_failed + 1))
                fi
              done
            }

            # 1. Approve on AI Foundry account
            foundry_account_name=$(az cognitiveservices account list \
              --subscription "${{ env.dev_test_prod_sub_id }}" \
              --resource-group "$projectResourceGroup" \
              --query "[?starts_with(name, 'aif2') && !starts_with(name, 'aif2-p')].name | [0]" -o tsv 2>/dev/null || echo "")

            if [ -n "$foundry_account_name" ]; then
              echo "AI Foundry account: $foundry_account_name"
              foundry_pe_url="https://management.azure.com/subscriptions/${{ env.dev_test_prod_sub_id }}/resourceGroups/${projectResourceGroup}/providers/Microsoft.CognitiveServices/accounts/${foundry_account_name}/privateEndpointConnections"
              approve_pending_connections "AI Foundry account ($foundry_account_name)" "$foundry_pe_url" "2024-10-01"
            else
              echo "No AI Foundry account found in $projectResourceGroup. Skipping Foundry approval."
            fi

            # 2. Approve on Storage Account 2001 (blob shared private link)
            storage_2001_name=$(az storage account list \
              --subscription "${{ env.dev_test_prod_sub_id }}" \
              --resource-group "$projectResourceGroup" \
              --query "[?contains(name, '2001')].name | [0]" -o tsv 2>/dev/null || echo "")

            if [ -n "$storage_2001_name" ]; then
              echo "Storage account 2001: $storage_2001_name"
              storage_pe_url="https://management.azure.com/subscriptions/${{ env.dev_test_prod_sub_id }}/resourceGroups/${projectResourceGroup}/providers/Microsoft.Storage/storageAccounts/${storage_2001_name}/privateEndpointConnections"
              approve_pending_connections "Storage account ($storage_2001_name)" "$storage_pe_url" "2024-01-01"
            else
              echo "No storage account with '2001' found in $projectResourceGroup. Skipping storage approval."
            fi

            echo ""
            echo "=== Summary: $total_approved approved, $total_failed failed ==="

      - name: 100b_create_foundry_agent
        if: success() && env.deleteAllServicesForProject != 'true' && env.enableAIFoundry == 'true'
        continue-on-error: true
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az account set --subscription "${{ env.dev_test_prod_sub_id }}"

            echo "=== AI Foundry Agent Creation ==="

            # Early network check: skip if private/hybrid networking
            _enablePublicGenAI="${{ env.enablePublicGenAIAccess }}"
            _enablePublicPerimeter="${{ env.enablePublicAccessWithPerimeter }}"

            if [ "$_enablePublicGenAI" != "true" ] || [ "$_enablePublicPerimeter" != "true" ]; then
              echo "Networking mode: enablePublicGenAIAccess=$_enablePublicGenAI, enablePublicAccessWithPerimeter=$_enablePublicPerimeter"
              echo "GH runner can only create agents when both are 'true' (public network mode)."
              echo "Current mode is private or hybrid — data-plane endpoint is unreachable."
              echo ""
              echo "To create agents, use one of:"
              echo "  - Self-hosted runner on a VM inside the VNet"
              echo "  - Azure Bastion > DSVM > run: python usecase_code/agent_foundry/agent_03_reponses_api.py"
              echo "  - Azure AI Foundry portal (via VPN/ExpressRoute)"

              # Still discover and save the endpoint for manual use
              foundry_account_id=$(az cognitiveservices account list \
                --subscription "${{ env.dev_test_prod_sub_id }}" \
                --resource-group "${{ env.admin_aifactoryPrefixRG }}${{ env.projectPrefix }}project${{ env.project_number_000 }}-${{ env.admin_locationSuffix }}-${{ env.dev_test_prod }}${{ env.admin_aifactorySuffixRG }}${{ env.projectSuffix }}" \
                --query "[?starts_with(name, 'aif2') && !starts_with(name, 'aif2-p')].id | [0]" -o tsv 2>/dev/null || echo "")

              if [ -n "$foundry_account_id" ]; then
                _ep=$(az rest --method GET \
                  --url "https://management.azure.com${foundry_account_id}/projects?api-version=2026-01-15-preview" \
                  -o json 2>/dev/null | jq -r ".value[0].properties.endpoint // empty")
                if [ -n "$_ep" ]; then
                  echo "Project endpoint: $_ep"
                  echo "foundryProjectEndpoint=$_ep" >> $GITHUB_ENV
                fi
              fi

              echo "foundryAgentCreated=skipped-private-network" >> $GITHUB_ENV
              echo "=== Agent creation task completed (skipped — private/hybrid network) ==="
              exit 0
            fi

            # Public network mode — proceed with agent creation
            projectNumber="${{ env.project_number_000 }}"
            projectName="prj${projectNumber}"
            locationSuffix="${{ env.admin_locationSuffix }}"
            envName="${{ env.dev_test_prod }}"
            projectPrefix="${{ env.projectPrefix }}"
            projectSuffix="${{ env.projectSuffix }}"
            projectNameReplaced="${projectName/prj/project}"
            projectResourceGroup="${{ env.admin_aifactoryPrefixRG }}${projectPrefix}${projectNameReplaced}-${locationSuffix}-${envName}${{ env.admin_aifactorySuffixRG }}${projectSuffix}"

            echo "Target resource group: $projectResourceGroup"

            # Find AI Foundry account
            foundry_account=$(az cognitiveservices account list \
              --subscription "${{ env.dev_test_prod_sub_id }}" \
              --resource-group "$projectResourceGroup" \
              --query "[?starts_with(name, 'aif2') && !starts_with(name, 'aif2-p')].{name:name, id:id}" \
              -o json | jq -r '.[0]')

            if [ "$foundry_account" = "null" ] || [ -z "$foundry_account" ]; then
              echo "No AI Foundry account found in resource group. Skipping agent creation."
              exit 0
            fi

            account_name=$(echo "$foundry_account" | jq -r '.name')
            account_id=$(echo "$foundry_account" | jq -r '.id')
            echo "Found AI Foundry account: $account_name"

            # Discover project endpoint
            project_json=$(az rest \
              --method GET \
              --url "https://management.azure.com${account_id}/projects?api-version=2026-01-15-preview" \
              -o json 2>/dev/null || echo '{"value":[]}')

            project_endpoint=$(echo "$project_json" | jq -r \
              "[.value[] | select(.name | startswith(\"aif2-p${projectNumber}\"))] | .[0].properties.endpoint // empty")

            if [ -z "$project_endpoint" ]; then
              project_endpoint=$(echo "$project_json" | jq -r '.value[0].properties.endpoint // empty')
            fi

            if [ -z "$project_endpoint" ]; then
              echo "No AI Foundry project with endpoint found. Skipping agent creation."
              exit 0
            fi

            echo "Found project endpoint: $project_endpoint"
            echo "foundryProjectEndpoint=$project_endpoint" >> $GITHUB_ENV

            # Create agent via SDK
            echo "Installing azure-ai-projects SDK..."
            pip install azure-ai-projects>=2.0.0 azure-identity --quiet

            echo "Creating agent via Azure AI Projects SDK..."
            export FOUNDRY_PROJECT_ENDPOINT="$project_endpoint"

            python3 -c "
            import os, sys
            from azure.identity import AzureCliCredential
            from azure.ai.projects import AIProjectClient
            from azure.ai.projects.models import PromptAgentDefinition
            endpoint = os.environ['FOUNDRY_PROJECT_ENDPOINT']
            print('Using project endpoint: ' + endpoint)
            credential = AzureCliCredential()
            project_client = AIProjectClient(endpoint=endpoint, credential=credential)
            try:
                agent = project_client.agents.create_version(
                    agent_name='agent-001',
                    definition=PromptAgentDefinition(
                        model='gpt-4o-mini',
                        instructions='You are a helpful AI assistant.',
                    ),
                )
                print('Agent created/updated: name=' + agent.name)
            except Exception as e:
                msg = str(e).lower()
                if 'timed out' in msg or 'name resolution' in msg or 'connection' in msg:
                    print('Network error, endpoint likely behind private network: ' + str(e))
                    sys.exit(0)
                print('Agent creation failed: ' + str(e), file=sys.stderr)
                sys.exit(1)
            "
            _rc=$?
            if [ $_rc -eq 0 ]; then
              echo "foundryAgentCreated=true" >> $GITHUB_ENV
            else
              echo "foundryAgentCreated=false" >> $GITHUB_ENV
            fi

            echo "=== Agent creation task completed ==="


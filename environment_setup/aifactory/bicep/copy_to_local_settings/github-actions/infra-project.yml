      - name: 69a-Grant-NetworkContributor-For-Injection
        # Grants the Foundry account SystemAssigned MI 'Network Contributor' on the agent VNet + subnet
        # so the auto-provisioned (Microsoft-managed) ACA environment can join the cross-RG agent VNet.
        # Without it the capability host fails with 'Invalid vnet resource ID provided...'.
        # Idempotent + best-effort: continue-on-error so a transient grant failure does NOT regress the
        # otherwise-working synchronous Foundry path — the later 69-wait-account-caphost step surfaces any
        # genuine injection failure with a clear error. Self-skips when injection is disabled.
        if: |
          env.enableAIFoundry == 'true' && env.deleteAllServicesForProject != 'true' &&
          env.debug_disable_69_aifoundry_2025 != 'true' && env.pre_foundry_gate_passed == 'true' &&
          env.foundry_1st_option_succeeded != 'true' && env.aiFoundryV2Exists != 'true' &&
          (env.foundryDeploymentType == '2' || env.foundryDeploymentType == '3') &&
          env.disableAgentNetworkInjection != 'true'
        continue-on-error: true
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            #!/bin/bash
            set -uo pipefail

            az account set --subscription "${{ env.dev_test_prod_sub_id }}"

            # Skip when agent network injection is OFF — no ACA injection, so no cross-RG VNet join is needed.
            if [ "${{ env.disableAgentNetworkInjection }}" = "true" ]; then
              echo "ℹ️  disableAgentNetworkInjection=true → agent network injection OFF. No Network Contributor grant needed. Skipping."
              exit 0
            fi

            # 1) Resolve the agent subnet id from the authoritative params file (same source as 69a-Validate-Subnet).
            params_file="./aifactory/parameters/dynamicNetworkParams.json"
            aca2_subnet_id=$(jq -r '.parameters.aca2SubnetId.value // empty' "$params_file" 2>/dev/null || echo "")
            if [ -z "$aca2_subnet_id" ]; then
              aca2_subnet_id=$(python -c "import json;d=json.load(open('$params_file'));print(d['parameters'].get('aca2SubnetId',{}).get('value',''))" 2>/dev/null || echo "")
            fi
            if [ -z "$aca2_subnet_id" ] || [ "$aca2_subnet_id" = "null" ]; then
              echo "::warning::aca2SubnetId is EMPTY → Bicep will skip networkInjections (no agent injection). No grant needed. Skipping."
              exit 0
            fi
            if [[ "$aca2_subnet_id" != /subscriptions/*/resourceGroups/*/providers/Microsoft.Network/virtualNetworks/*/subnets/* ]]; then
              echo "::error::❌ aca2SubnetId is NOT a valid subnet resource ID: $aca2_subnet_id"
              exit 1
            fi

            # Parse subnet id → subscription / rg / vnet, then build the parent VNet resource id.
            sub_id=$(echo "$aca2_subnet_id" | awk -F'/' '{print $3}')
            sub_rg=$(echo "$aca2_subnet_id"  | awk -F'/' '{print $5}')
            vnet_name=$(echo "$aca2_subnet_id" | awk -F'/' '{print $9}')
            vnet_id="/subscriptions/${sub_id}/resourceGroups/${sub_rg}/providers/Microsoft.Network/virtualNetworks/${vnet_name}"
            echo "Agent subnet : $aca2_subnet_id"
            echo "Parent VNet  : $vnet_id"

            # 2) Resolve the project resource group (same construction as the foundry account tasks).
            commonRGNamePrefix="${{ env.admin_aifactoryPrefixRG }}"
            projectNumber="${{ env.project_number_000 }}"
            projectName="prj${projectNumber}"
            locationSuffix="${{ env.admin_locationSuffix }}"
            envName="${{ env.dev_test_prod }}"
            aifactorySuffixRG="${{ env.admin_aifactorySuffixRG }}"
            projectPrefix="${{ env.projectPrefix }}"
            projectSuffix="${{ env.projectSuffix }}"
            projectNameReplaced="${projectName/prj/project}"
            targetResourceGroup="${commonRGNamePrefix}${projectPrefix}${projectNameReplaced}-${locationSuffix}-${envName}${aifactorySuffixRG}${projectSuffix}"
            echo "targetResourceGroup: $targetResourceGroup"

            # 3) Poll for the Foundry account + its SystemAssigned MI principalId.
            principal_id=""
            account_name=""
            for attempt in $(seq 1 30); do
              account_name=$(az resource list \
                --resource-group "$targetResourceGroup" \
                --resource-type "Microsoft.CognitiveServices/accounts" \
                --query "[?starts_with(name, 'aif2') && !starts_with(name, 'aif2-p')].name" \
                -o tsv 2>/dev/null | head -n1)
              if [ -n "$account_name" ]; then
                principal_id=$(az cognitiveservices account show \
                  --name "$account_name" \
                  --resource-group "$targetResourceGroup" \
                  --query "identity.principalId" -o tsv 2>/dev/null || echo "")
              fi
              if [ -n "$principal_id" ] && [ "$principal_id" != "null" ]; then
                echo "✅ Foundry account '$account_name' SystemAssigned MI principalId: $principal_id (attempt $attempt)"
                break
              fi
              echo "⏳ Attempt $attempt/30: account/MI not ready yet (account='${account_name:-<none>}'). Waiting 10s..."
              sleep 10
            done

            if [ -z "$principal_id" ] || [ "$principal_id" = "null" ]; then
              echo "::error::❌ Could not resolve the Foundry account SystemAssigned MI principalId in RG '$targetResourceGroup' after polling."
              echo "::error::   Without this, the auto-provisioned ACA managed environment cannot join the cross-RG agent VNet."
              exit 1
            fi

            # 4) Grant Network Contributor on the agent VNet (covers the child subnet) AND the subnet itself.
            #    Uses the ARM Authorization REST API directly via 'az rest' (NOT 'az role assignment', which
            #    fails with MissingSubscription in the SP context). Cross-RG, idempotent via atScope() filter.
            NET_CONTRIB_ROLE_GUID="4d97b98b-1d4f-4787-a291-c67834d212e7"  # built-in 'Network Contributor'
            role_def_id="/subscriptions/${sub_id}/providers/Microsoft.Authorization/roleDefinitions/${NET_CONTRIB_ROLE_GUID}"

            grant_role() {
              local scope="$1"
              local existing
              existing=$(az rest --method get \
                --url "https://management.azure.com${scope}/providers/Microsoft.Authorization/roleAssignments?api-version=2022-04-01&\$filter=atScope()" \
                --query "value[?properties.principalId=='${principal_id}' && properties.roleDefinitionId=='${role_def_id}'].id | [0]" \
                -o tsv 2>/dev/null || echo "")
              if [ -n "$existing" ] && [ "$existing" != "null" ]; then
                echo "✅ Network Contributor already assigned at: $scope"
                return 0
              fi
              local ra_guid
              ra_guid=$(cat /proc/sys/kernel/random/uuid 2>/dev/null || python -c "import uuid;print(uuid.uuid4())")
              echo "➕ Granting Network Contributor to $principal_id at: $scope"
              if az rest --method put \
                --url "https://management.azure.com${scope}/providers/Microsoft.Authorization/roleAssignments/${ra_guid}?api-version=2022-04-01" \
                --body "{\"properties\":{\"roleDefinitionId\":\"${role_def_id}\",\"principalId\":\"${principal_id}\",\"principalType\":\"ServicePrincipal\"}}" 1>/dev/null; then
                echo "✅ Granted."
              else
                echo "::error::❌ Failed to grant Network Contributor at: $scope"
                return 1
              fi
            }

            grant_rc=0
            grant_role "$vnet_id"        || grant_rc=1
            grant_role "$aca2_subnet_id" || grant_rc=1
            if [ "$grant_rc" -ne 0 ]; then
              echo "::error::❌ One or more Network Contributor grants failed — see errors above."
              exit 1
            fi

            echo "✅ Network Contributor granted to the Foundry account MI on the agent VNet/subnet."

      - name: 69-Rehydrate
        if: |
          success() && env.enableAIFoundry == 'true' && env.deleteAllServicesForProject != 'true' &&
          env.debug_disable_69_aifoundry_2025 != 'true' && env.aiFoundryV2Exists != 'true' &&
          (env.foundryDeploymentType == '2' || env.foundryDeploymentType == '3')
        shell: bash
        run: |
          echo "Rehydration takes 2.5 to 5 minutes to allow AI Foundry account to finish..."
          sleep 300

      - name: 69-wait-account-caphost-succeeded
        if: |
          env.enableAIFoundry == 'true' && env.enableAFoundryCaphost == 'true' &&
          env.deleteAllServicesForProject != 'true' && env.debug_disable_69_aifoundry_2025 != 'true' &&
          env.disableAgentNetworkInjection != 'true' &&
          (env.foundryDeploymentType == '2' || env.foundryDeploymentType == '3')
        continue-on-error: false
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -e
            az account set --subscription "${{ env.dev_test_prod_sub_id }}"

            commonRGNamePrefix="${{ env.admin_aifactoryPrefixRG }}"
            projectNumber="${{ env.project_number_000 }}"
            projectName="prj${projectNumber}"
            locationSuffix="${{ env.admin_locationSuffix }}"
            envName="${{ env.dev_test_prod }}"
            aifactorySuffixRG="${{ env.admin_aifactorySuffixRG }}"
            projectPrefix="${{ env.projectPrefix }}"
            projectSuffix="${{ env.projectSuffix }}"
            projectNameReplaced="${projectName/prj/project}"
            projectResourceGroup="${commonRGNamePrefix}${projectPrefix}${projectNameReplaced}-${locationSuffix}-${envName}${aifactorySuffixRG}${projectSuffix}"

            # Find the AI Foundry account
            account_name=$(az cognitiveservices account list \
              --subscription "${{ env.dev_test_prod_sub_id }}" \
              --resource-group "$projectResourceGroup" \
              --query "[?starts_with(name, 'aif2') && !starts_with(name, 'aif2-p')].name | [0]" -o tsv 2>/dev/null || echo "")

            if [ -z "$account_name" ]; then
              echo "No AI Foundry account found in $projectResourceGroup. Skipping wait."
              exit 0
            fi

            echo "=== Waiting for account-level capability host to reach Succeeded ==="
            echo "Account: $account_name  RG: $projectResourceGroup"

            caphost_name="${account_name//\-/}caphost"
            caphost_url="https://management.azure.com/subscriptions/${{ env.dev_test_prod_sub_id }}/resourceGroups/${projectResourceGroup}/providers/Microsoft.CognitiveServices/accounts/${account_name}/capabilityHosts/${caphost_name}?api-version=2025-07-01-preview"

            max_attempts=45   # 45 x 20s = 15 min
            for i in $(seq 1 $max_attempts); do
              caphost_json=$(az rest --method GET --url "$caphost_url" -o json 2>/dev/null || echo "")
              if [ -z "$caphost_json" ]; then
                echo "  [$i/$max_attempts] Account caphost not found yet — platform may still be provisioning..."
                sleep 20
                continue
              fi

              prov_state=$(echo "$caphost_json" | jq -r '.properties.provisioningState // "Unknown"')
              echo "  [$i/$max_attempts] Account caphost provisioningState: $prov_state"

              if [ "$prov_state" = "Succeeded" ]; then
                echo "Account capability host is Succeeded. Proceeding to 69b."
                exit 0
              elif [ "$prov_state" = "Failed" ]; then
                echo "::error::Account capability host is in Failed state. 69b will likely fail."
                exit 1
              fi

              sleep 20
            done

            echo "::warning::Account capability host did not reach Succeeded within 15 min (last state: $prov_state)."
            echo "::warning::Proceeding to 69b anyway — deployment may still succeed."

